name: Update EGX Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: '20 8 * * 0-4'
    - cron: '15 12 * * 0-4'

permissions:
  contents: write

concurrency:
  group: egx-market-data
  cancel-in-progress: false

jobs:
  update-market-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run V4.2 market collector
        run: node scripts/fetch-market-data.js

      - name: Build V4.2.1 symbol audit
        run: node scripts/build-symbol-audit.js

      - name: Build V5.2 intelligence reports
        run: node scripts/build-v52-intelligence.js

      - name: Build V5.4 Universe Index
        run: node scripts/build-v54-universe-index.js
              - name: Build V5.5 Sector and Investor Flow Reports
        run: node scripts/build-v55-sector-investor-flow.js

      - name: Commit generated market data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "Update EGX market data and V5.4 universe index"
            git pull --rebase
            git push
          fi
