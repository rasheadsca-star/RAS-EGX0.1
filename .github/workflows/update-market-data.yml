name: Update EGX Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: '20 8 * * 0-4'
    - cron: '15 12 * * 0-4'

permissions:
  contents: write

concurrency:
  group: egx-market-data
  cancel-in-progress: false

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install optional local tooling
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install --no-audit --no-fund
          fi

      - name: Mandatory market collector
        run: node scripts/fetch-market-data.js

      - name: Optional legacy intelligence builders
        run: |
          set -u
          optional_scripts=(
            scripts/build-symbol-audit.js
            scripts/build-v52-intelligence.js
            scripts/build-v54-universe-index.js
            scripts/build-v55-sector-investor-flow.js
            scripts/build-v56-history-50.js
            scripts/build-v56-technical-report.js
            scripts/collect-egx-investor-type.js
            scripts/collect-v56-news.js
            scripts/collect-mubasher-analysis-tools.js
            scripts/build-multi-source-intelligence.js
            scripts/apply-multisource-intelligence-to-ranking.js
            scripts/apply-news-impact-to-recommendations.js
            scripts/build-institutional-score.js
            scripts/build-price-source-audit.js
            scripts/build-price-freshness-report.js
            scripts/build-signal-quality-engine.js
            scripts/build-entry-trigger-engine.js
            scripts/build-alert-decision-center.js
            scripts/build-actionable-watchlist.js
            scripts/build-data-operations-center.js
            scripts/build-engines-console-report.js
            scripts/build-executive-home-report.js
            scripts/build-workflow-budget-status.js
            scripts/build-workflow-source-verification.js
            scripts/build-session-memory-status.js
            scripts/build-sector-completion-report.js
            scripts/build-regression-report.js
            scripts/build-recommendation-outcome-tracker.js
            scripts/build-recommendation-accuracy.js
            scripts/build-recommendation-performance-index.js
            scripts/build-accuracy-interpretation-report.js
            scripts/build-recommendation-validation-panel.js
            scripts/build-portfolio-decision-rules.js
            scripts/build-rebalancing-candidates.js
          )
          for script in "${optional_scripts[@]}"; do
            if [ -f "$script" ]; then
              echo "Running optional $script"
              node "$script" || echo "::warning::$script failed; continuing because it is optional."
            else
              echo "Skipping missing optional $script"
            fi
          done

      - name: Mandatory history, reconciliation, ranking and guard
        run: |
          set -euo pipefail
          if [ -f scripts/build-history-50-engine.js ]; then node scripts/build-history-50-engine.js; else echo "::warning::build-history-50-engine.js missing"; fi
          if [ -f scripts/build-price-reconciliation-report.js ]; then node scripts/build-price-reconciliation-report.js; else echo "::warning::build-price-reconciliation-report.js missing"; fi
          if [ -f scripts/build-final-opportunity-ranking.js ]; then node scripts/build-final-opportunity-ranking.js; else echo "::warning::build-final-opportunity-ranking.js missing"; fi
          if [ -f scripts/build-confidence-guard-report.js ]; then node scripts/build-confidence-guard-report.js; else echo "::warning::build-confidence-guard-report.js missing"; fi
          if [ -f scripts/build-daily-decision-brief.js ]; then node scripts/build-daily-decision-brief.js; else echo "::warning::build-daily-decision-brief.js missing"; fi

      - name: /GOAL integrated quality and decision gate
        run: npm run goal

      - name: Commit generated market data and GOAL reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json VERSION.json package.json index.html app.js styles.css scripts/*.js .github/workflows/update-market-data.yml || true
          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "Apply integrated EGX GOAL decision center"
            git pull --rebase
            git push
          fi
