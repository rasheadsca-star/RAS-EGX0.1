name: Update EGX Market Data

on:
  workflow_dispatch:
  schedule:
    # EGX trading days are typically Sun-Thu. Times are UTC.
    # Mid-session refresh updates the same session date; final run after close keeps the closing snapshot.
    - cron: "15 8 * * 0-4"
    - cron: "45 12 * * 0-4"

permissions:
  contents: write

concurrency:
  group: egx-market-history-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch public market snapshot
        run: node scripts/fetch-market-data.js

      - name: Optional historical backfill import
        run: node scripts/import-history-backfill.js || echo "No backfill importer or file found"

      - name: Auto rolling 50-session history
        run: node scripts/build-history-50-engine.js

      - name: Optional intelligence reports
        run: node scripts/build-v52-intelligence.js || echo "V5.2 intelligence builder skipped"

      - name: Commit generated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.json
          git diff --cached --quiet && echo "No data changes" || git commit -m "Auto update EGX rolling 50-session history"
          git push || echo "Push skipped or failed"
