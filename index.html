<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EGX Pro Hub — Professional Terminal V8.1.1.1.1.1.1.1.1.1</title>
  <style>
    :root{
      --bg:#050914;--bg2:#071326;--card:#08182d;--card2:#0a1d36;
      --border:rgba(119,169,235,.24);--border2:rgba(56,189,248,.38);
      --text:#edf6ff;--muted:#93a9c9;--blue:#0ea5e9;--blue2:#1d4ed8;
      --green:#22c55e;--red:#ef4444;--orange:#f59e0b;--gold:#fbbf24;--purple:#a78bfa
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Tahoma,Arial,sans-serif;direction:rtl;overflow-x:hidden}
    button,input,select,textarea{font-family:inherit}
    .shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh;background:radial-gradient(circle at 15% 10%,rgba(14,165,233,.16),transparent 32%),radial-gradient(circle at 70% 0%,rgba(34,197,94,.10),transparent 28%),linear-gradient(135deg,#040815 0%,#061425 48%,#030712 100%)}
    .side{grid-column:1;border-left:1px solid rgba(119,169,235,.2);background:linear-gradient(180deg,rgba(6,18,34,.98),rgba(4,12,24,.98));padding:14px 10px;position:sticky;top:0;height:100vh;overflow:auto;box-shadow:-16px 0 40px rgba(0,0,0,.24);z-index:5}
    .main{grid-column:2;padding:14px;min-width:0}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:4px 4px 18px;border-bottom:1px solid rgba(119,169,235,.16)}
    .logo{width:46px;height:46px;display:grid;place-items:center;color:white;font-weight:950;border-radius:16px;background:linear-gradient(135deg,#0ea5e9,#22c55e,#fbbf24);box-shadow:0 12px 24px rgba(14,165,233,.18)}
    .brand h1{font-size:18px;margin:0;font-weight:950}.brand p{font-size:12px;margin:2px 0 0;color:var(--muted)}
    .nav-title{font-size:12px;color:#9fb5d5;margin:0 8px 10px;font-weight:800}.nav{display:grid;gap:8px}
    .nav button{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid transparent;background:transparent;color:#dbeafe;padding:10px 11px;border-radius:13px;font-weight:850;cursor:pointer;text-align:right}
    .nav button:hover{background:rgba(14,165,233,.09);border-color:rgba(56,189,248,.2)}
    .nav button.active{background:linear-gradient(135deg,rgba(14,165,233,.98),rgba(29,78,216,.92));border-color:rgba(125,211,252,.55);color:#fff;box-shadow:0 14px 30px rgba(14,165,233,.24),inset 0 1px 0 rgba(255,255,255,.12)}
    .ico{width:28px;height:28px;display:grid;place-items:center;border-radius:10px;background:rgba(148,163,184,.08)}
    .footer{margin-top:24px;padding:14px;border-radius:16px;border:1px solid rgba(119,169,235,.18);background:rgba(8,24,45,.72)}
    .live{display:inline-flex;align-items:center;gap:7px;color:#b7f7cf;font-weight:850;font-size:12px}.live:before{content:"";width:9px;height:9px;background:var(--green);border-radius:999px;box-shadow:0 0 16px rgba(34,197,94,.8)}
    .muted{color:var(--muted);font-size:12px;line-height:1.8}
    .head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px}
    .head h2{margin:0;font-size:28px;line-height:1.15;font-weight:950;letter-spacing:-.6px}.head p{margin:6px 0 0;color:var(--muted);font-size:13px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-start}.btn{border:1px solid rgba(119,169,235,.28);background:rgba(7,19,38,.92);color:#eaf2ff;padding:10px 13px;border-radius:13px;font-weight:900;cursor:pointer;white-space:nowrap}
    .btn.primary{background:linear-gradient(135deg,#0ea5e9,#1d4ed8);border-color:rgba(125,211,252,.55);box-shadow:0 10px 25px rgba(14,165,233,.2)}
    .btn.good{background:linear-gradient(135deg,#16a34a,#047857);border-color:rgba(134,239,172,.45)}
    .btn.warn{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.38);color:#fde68a}
    .btn:hover{filter:brightness(1.08)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}.chip{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(119,169,235,.22);background:rgba(7,19,38,.72);border-radius:999px;padding:7px 10px;color:#cfe3ff;font-size:12px;font-weight:850}
    .dot{width:8px;height:8px;border-radius:999px;background:var(--green);box-shadow:0 0 12px rgba(34,197,94,.75)}.warn .dot{background:var(--orange);box-shadow:0 0 12px rgba(245,158,11,.75)}.info .dot{background:var(--blue);box-shadow:0 0 12px rgba(14,165,233,.75)}
    .kpis{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:12px}.card,.panel{background:linear-gradient(180deg,rgba(8,24,45,.88),rgba(6,17,32,.88));border:1px solid var(--border);border-radius:18px;box-shadow:0 18px 45px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.03)}
    .kpi{padding:12px;position:relative;overflow:hidden;min-height:96px}.kpi:before{content:"";position:absolute;inset:auto -25px -35px auto;width:110px;height:110px;border-radius:999px;background:radial-gradient(circle,rgba(14,165,233,.16),transparent 65%)}
    .kpi .label{color:#f7c44f;font-size:12px;font-weight:950}.kpi .value{font-size:26px;margin-top:6px;font-weight:950;letter-spacing:-.3px}.kpi .delta{margin-top:4px;color:#86efac;font-size:12px;font-weight:900}.kpi .delta.red{color:#fca5a5}.spark{height:24px;margin-top:4px}.spark svg{width:100%;height:24px}
    .layout{display:grid;grid-template-columns:285px 1fr;gap:12px;align-items:start}.leftstack{display:grid;gap:12px}.panel{padding:12px;min-width:0}.panel h3{margin:0 0 12px;font-size:16px;font-weight:950;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .list{display:grid;gap:8px}.listrow{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(119,169,235,.1)}.listrow:last-child{border-bottom:none}
    .rank{width:24px;height:24px;border-radius:999px;display:grid;place-items:center;border:1px solid rgba(251,191,36,.55);color:#fbbf24;font-size:12px;font-weight:950}.bar{height:7px;border-radius:999px;background:#1f314d;overflow:hidden;min-width:64px}.bar span{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#d9f99d)}
    .ministat{display:grid;grid-template-columns:1fr auto;gap:7px;font-size:12px;margin:7px 0;color:#dbeafe}.ministat b{color:#fff}.segment{height:10px;border-radius:999px;overflow:hidden;display:flex;background:#1f2937;margin-top:8px}.segment i:nth-child(1){background:#22c55e}.segment i:nth-child(2){background:#84cc16}.segment i:nth-child(3){background:#f59e0b}.segment i:nth-child(4){background:#ef4444}
    .note{display:flex;gap:8px;align-items:flex-start;color:#cfe3ff;font-size:12px;padding:7px 0}.mark{width:18px;height:18px;border-radius:6px;background:rgba(34,197,94,.16);color:#86efac;display:grid;place-items:center;flex:0 0 auto}.mark.warn{background:rgba(245,158,11,.16);color:#fbbf24}.mark.red{background:rgba(239,68,68,.16);color:#fca5a5}
    .mainpanel{min-width:0}.toolbar{display:grid;grid-template-columns:1.35fr 145px 145px 145px 150px auto;gap:8px;padding:12px;margin-bottom:12px}
    input,select,textarea{width:100%;background:rgba(4,12,24,.72);color:#fff;border:1px solid rgba(119,169,235,.26);border-radius:13px;padding:11px 12px;outline:none;min-height:42px}textarea{resize:vertical;min-height:120px;direction:ltr;text-align:left;font-family:Consolas,monospace}input:focus,select:focus,textarea:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.12)}
    .tablewrap{overflow:auto;border-radius:18px;border:1px solid var(--border);background:rgba(5,13,27,.55)}table{width:100%;border-collapse:collapse;min-width:1040px}th,td{border-bottom:1px solid rgba(119,169,235,.13);border-left:1px solid rgba(119,169,235,.08);padding:8px 6px;text-align:right;white-space:nowrap;font-size:11.5px}th{color:#cfe3ff;background:rgba(8,24,45,.95);position:sticky;top:0;z-index:2;font-weight:950}tr:hover td{background:rgba(14,165,233,.055)}tr.selected td{background:rgba(14,165,233,.12)}
    .symbol{font-weight:950;color:#fff}.name{color:#dbeafe}.pos{color:#4ade80;font-weight:900}.neg{color:#f87171;font-weight:900}.pill{display:inline-flex;align-items:center;justify-content:center;min-width:74px;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:950;border:1px solid transparent}
    .buy{background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.38);color:#86efac}.watch{background:rgba(14,165,233,.13);border-color:rgba(14,165,233,.34);color:#93c5fd}.near{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.38);color:#fcd34d}.risk{background:rgba(239,68,68,.14);border-color:rgba(239,68,68,.38);color:#fca5a5}
    .grade{color:#86efac;font-weight:950}.conf{display:flex;align-items:center;gap:7px}.conf .pct{min-width:34px;font-weight:950}.conf .smallbar{width:54px;height:6px;border-radius:999px;background:#1f314d;overflow:hidden}.conf .smallbar i{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#fbbf24)}.rowspark svg{width:58px;height:22px;display:block}
    .pages{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0 2px}.page{min-width:34px;height:34px;display:grid;place-items:center;background:rgba(7,19,38,.8);border:1px solid rgba(119,169,235,.24);border-radius:10px;color:#dbeafe;font-weight:900}.page.active{background:linear-gradient(135deg,#0ea5e9,#1d4ed8);color:white}
    .detail{margin-top:14px;display:grid;grid-template-columns:1fr 1.15fr;gap:14px}.chart{height:250px;border-radius:16px;border:1px solid rgba(119,169,235,.18);background:rgba(3,10,21,.75);padding:10px;position:relative}.chart svg{width:100%;height:100%;display:block}.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.metric{background:rgba(7,19,38,.78);border:1px solid rgba(119,169,235,.18);border-radius:14px;padding:11px}.metric span{display:block;color:#93a9c9;font-size:11px}.metric b{display:block;font-size:17px;margin-top:4px}
    .recbox{background:linear-gradient(180deg,rgba(16,185,129,.2),rgba(5,150,105,.08));border:1px solid rgba(34,197,94,.35);border-radius:16px;padding:14px;text-align:center}.recbox h4{margin:0;color:#86efac;font-size:20px}.circle{width:88px;height:88px;border-radius:999px;margin:10px auto 0;display:grid;place-items:center;background:conic-gradient(#22c55e calc(var(--p,75)*1%),rgba(148,163,184,.18) 0);position:relative}.circle:after{content:"";position:absolute;inset:8px;border-radius:999px;background:#08182d}.circle b{position:relative;z-index:1;font-size:22px}
    .dashgrid{display:grid;grid-template-columns:1.2fr .8fr;gap:12px}.heatmap{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:7px}.heat{min-height:64px;border-radius:12px;padding:10px;text-align:center;background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.2)}.heat.red{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.22)}.heat.neutral{background:rgba(148,163,184,.12);border-color:rgba(148,163,184,.18)}.heat b{display:block;font-size:13px}.heat span{display:block;margin-top:6px;font-weight:950}
    .portgrid{display:grid;grid-template-columns:350px 1fr;gap:14px}.donut{width:210px;height:210px;border-radius:999px;margin:8px auto;background:conic-gradient(#22c55e 0 28%,#0ea5e9 28% 47%,#fbbf24 47% 63%,#f97316 63% 75%,#ef4444 75% 84%,#a78bfa 84% 92%,#64748b 92% 100%);position:relative}.donut:after{content:"";position:absolute;inset:42px;background:#08182d;border-radius:999px;border:1px solid rgba(119,169,235,.18)}.donut-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;z-index:1;font-weight:950}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}.tabs button{border:1px solid rgba(119,169,235,.24);background:rgba(7,19,38,.8);color:#dbeafe;border-radius:12px;padding:9px 11px;font-weight:900;cursor:pointer}.tabs button.active{background:linear-gradient(135deg,#0ea5e9,#1d4ed8);color:white}
    .classic{min-height:100vh;background:#eef4fa;color:#08182d;padding:24px}.classic .box{background:white;border:1px solid #d7e3f0;border-radius:18px;padding:18px;margin:14px 0}.classic table{color:#08182d;min-width:900px}.classic th{background:#edf4fb;color:#08182d;position:static}.classic .btn{color:white}

    .microgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px}
    .microcard{background:rgba(7,19,38,.72);border:1px solid rgba(119,169,235,.18);border-radius:14px;padding:10px;min-height:78px}
    .microcard span{display:block;color:#93a9c9;font-size:11px}.microcard b{display:block;font-size:18px;margin-top:5px}
    .quickrow{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;padding:8px;border-bottom:1px solid rgba(119,169,235,.10)}
    .quickrow:last-child{border-bottom:0}
    .quickrow small{color:#93a9c9}
    .screen-jump{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
    .screen-jump button{padding:10px;border-radius:14px;border:1px solid rgba(119,169,235,.22);background:rgba(7,19,38,.72);color:#dbeafe;font-weight:900;cursor:pointer}
    .screen-jump button:hover{border-color:#38bdf8;background:rgba(14,165,233,.12)}
    .focus-band{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
    .focus-card{background:rgba(8,24,45,.72);border:1px solid rgba(119,169,235,.20);border-radius:16px;padding:12px}
    .focus-card h4{margin:0 0 8px;font-size:13px;color:#fbbf24}
    @media(max-width:1100px){.screen-jump,.focus-band,.microgrid{grid-template-columns:1fr}}

    .import-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
    .import-card{background:rgba(7,19,38,.76);border:1px solid rgba(119,169,235,.22);border-radius:16px;padding:12px;min-height:160px}
    .import-card h4{margin:0 0 8px;color:#fbbf24;font-size:14px}
    .import-card p{margin:0 0 10px;color:#93a9c9;font-size:12px;line-height:1.7}
    .filebox{border:1px dashed rgba(125,211,252,.38);border-radius:14px;padding:12px;background:rgba(14,165,233,.06);text-align:center}
    .filebox input{border:0;background:transparent;padding:4px;min-height:0}
    .import-status{margin-top:8px;padding:8px 10px;border-radius:12px;background:rgba(8,24,45,.86);border:1px solid rgba(119,169,235,.18);color:#cfe3ff;font-size:12px;line-height:1.7}
    .import-status.good{border-color:rgba(34,197,94,.38);color:#bbf7d0}
    .import-status.bad{border-color:rgba(239,68,68,.38);color:#fecaca}
    .preview-img{width:100%;max-height:170px;object-fit:contain;border-radius:12px;border:1px solid rgba(119,169,235,.18);background:#020617;margin-top:8px}
    .mapping-table{min-width:760px!important}
    .mapping-table input{min-height:32px;padding:6px 8px;border-radius:10px}
    .help-list{margin:8px 0 0;padding:0 18px;color:#93a9c9;font-size:12px;line-height:1.7}
    @media(max-width:1100px){.import-grid{grid-template-columns:1fr}}

    .command-strip{display:grid;grid-template-columns:1.2fr .8fr .8fr .8fr;gap:10px;margin-bottom:12px}
    .command-card{background:linear-gradient(180deg,rgba(8,24,45,.9),rgba(5,13,27,.88));border:1px solid rgba(119,169,235,.22);border-radius:18px;padding:12px;min-height:96px}
    .command-card h4{margin:0 0 6px;color:#fbbf24;font-size:13px}
    .command-card b{font-size:22px}.command-card p{margin:6px 0 0;color:#93a9c9;font-size:12px;line-height:1.7}
    .scoregrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}
    .score{background:rgba(7,19,38,.78);border:1px solid rgba(119,169,235,.18);border-radius:14px;padding:10px;text-align:center}
    .score span{display:block;color:#93a9c9;font-size:11px}.score b{display:block;margin-top:4px;font-size:18px}
    .plan-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:10px}
    .plan-card{background:rgba(7,19,38,.78);border:1px solid rgba(119,169,235,.18);border-radius:14px;padding:10px}
    .plan-card h4{margin:0 0 6px;font-size:13px;color:#dbeafe}.plan-card p{margin:0;color:#93a9c9;font-size:12px;line-height:1.6}
    .drawer{position:fixed;inset:0;z-index:9999;display:none;background:rgba(0,0,0,.72);padding:16px}
    .drawer.show{display:flex;align-items:center;justify-content:center}
    .drawer-box{width:min(1180px,96vw);max-height:92vh;overflow:auto;background:#071326;border:1px solid rgba(125,211,252,.35);border-radius:24px;padding:16px;box-shadow:0 30px 90px rgba(0,0,0,.55)}
    .drawer-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    .drawer-head h3{margin:0;font-size:24px}.drawer-head p{margin:6px 0 0;color:#93a9c9}
    .watch-star{border:1px solid rgba(251,191,36,.45);background:rgba(251,191,36,.12);color:#fde68a;border-radius:12px;padding:7px 9px;font-weight:950;cursor:pointer}
    .watch-star.active{background:linear-gradient(135deg,#f59e0b,#b45309);color:white}
    .signal-timeline{border-right:2px solid rgba(119,169,235,.18);padding-right:14px}
    .signal-item{position:relative;margin:0 0 12px;padding:9px 10px;background:rgba(7,19,38,.72);border:1px solid rgba(119,169,235,.15);border-radius:14px}
    .signal-item:before{content:"";position:absolute;right:-20px;top:17px;width:10px;height:10px;border-radius:50%;background:#22c55e;box-shadow:0 0 12px rgba(34,197,94,.7)}
    .signal-item.risk:before{background:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.7)}
    .settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px;border-radius:14px;background:rgba(7,19,38,.62);border:1px solid rgba(119,169,235,.16);margin-bottom:8px}
    .switch{width:46px;height:24px;border-radius:999px;background:#1f2937;position:relative;cursor:pointer;border:1px solid rgba(119,169,235,.24)}
    .switch.on{background:#047857}.switch:after{content:"";position:absolute;top:3px;right:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.2s}.switch.on:after{right:25px}
    @media(max-width:1100px){.command-strip,.scoregrid,.plan-grid,.settings-grid{grid-template-columns:1fr}}

    .tool-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
    .tool-card{background:linear-gradient(180deg,rgba(8,24,45,.9),rgba(5,13,27,.88));border:1px solid rgba(119,169,235,.22);border-radius:18px;padding:12px;min-height:100px}
    .tool-card span{display:block;color:#93a9c9;font-size:11px}.tool-card b{display:block;font-size:24px;margin-top:5px}.tool-card small{display:block;margin-top:5px;color:#cfe3ff}
    .meter{height:8px;border-radius:999px;background:#1f314d;overflow:hidden;margin-top:8px}
    .meter i{display:block;height:100%;background:linear-gradient(90deg,#0ea5e9,#22c55e,#fbbf24)}
    .two-col{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}
    .signal-box{border:1px solid rgba(119,169,235,.18);background:rgba(7,19,38,.70);border-radius:14px;padding:10px;margin-bottom:8px}
    .signal-box h4{margin:0 0 6px;font-size:13px;color:#fbbf24}.signal-box p{margin:0;color:#93a9c9;font-size:12px;line-height:1.7}
    @media(max-width:1100px){.tool-grid,.two-col{grid-template-columns:1fr}}

    .history-badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:950;border:1px solid rgba(119,169,235,.24);background:rgba(7,19,38,.72);color:#dbeafe}
    .history-badge.ok{border-color:rgba(34,197,94,.42);background:rgba(34,197,94,.12);color:#bbf7d0}
    .history-badge.warn{border-color:rgba(245,158,11,.42);background:rgba(245,158,11,.12);color:#fde68a}
    .history-badge.bad{border-color:rgba(239,68,68,.42);background:rgba(239,68,68,.12);color:#fecaca}
    .history-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:10px 0}
    .history-card{background:rgba(7,19,38,.72);border:1px solid rgba(119,169,235,.16);border-radius:14px;padding:10px}
    .history-card span{display:block;color:#93a9c9;font-size:11px}.history-card b{display:block;margin-top:4px;font-size:17px}

function parseSmartPortfolioLine(line){
  const raw=String(line||"").trim();
  if(!raw)return null;
  const up=raw.toUpperCase();
  const symbolMatch=up.match(/\b[A-Z]{2,8}(?:\.[A-Z]{1,3})?\b/);
  if(!symbolMatch)return null;
  const symbol=cleanSymbol(symbolMatch[0]);
  const row=findMarketRow(symbol);
  const marketPrice=num(row&&row.price);
  const rest=raw.slice(up.indexOf(symbolMatch[0])+symbolMatch[0].length);
  const tokenPattern=/[+-]?(?:\d{1,3}(?:,\d{3})+|\d+)(?:\.\d+)?\s*[%٪]?/g;
  const tokens=(rest.match(tokenPattern)||[]).map(x=>String(x).trim()).filter(Boolean);
  if(!tokens.length)return null;
  const pctToken=[...tokens].reverse().find(t=>/[٪%]/.test(t));
  const pct=pctToken!=null?normalizePercentToken(pctToken):null;
  const nums=tokens.map(t=>({raw:t,value:num(t.replace(/[٪%]/g,"")),isPct:/[٪%]/.test(t),signed:/^[+-]/.test(t)})).filter(x=>x.value!=null);
  const nonPct=nums.filter(x=>!x.isPct);
  if(!nonPct.length)return null;

  // Broker statement format: SYMBOL 110,956.50 +0.31% or SYMBOL 110,956.50 +347.54 +0.31%
  if(pct!=null && nonPct[0].value>=1000){
    const value=nonPct[0].value;
    const pnlAbs=(nonPct[1] && nonPct[1].signed) ? nonPct[1].value : null;
    let cost=null, pnl=null, qty=null, avg=null;
    if(pct!==-100){ cost=value/(1+pct/100); pnl=value-cost; }
    else if(pnlAbs!=null){ pnl=pnlAbs; cost=value-pnlAbs; }
    if(marketPrice && marketPrice>0){ qty=value/marketPrice; avg=(cost && qty)?cost/qty:marketPrice; }
    return {symbol,value,pnlPct:pct,pnlAbs,qty:qty||0,avg:avg||marketPrice||0,inputType:"value_pct"};
  }

  // Broker statement without percent but with signed absolute P/L: SYMBOL 110,956.50 +347.54
  if(pct==null && nonPct.length>=2 && nonPct[0].value>=1000 && nonPct[1].signed){
    const value=nonPct[0].value, pnlAbs=nonPct[1].value;
    const cost=value-pnlAbs;
    const pnlPct=cost?pnlAbs/cost*100:0;
    let qty=null, avg=null;
    if(marketPrice && marketPrice>0){ qty=value/marketPrice; avg=(cost && qty)?cost/qty:marketPrice; }
    return {symbol,value,pnlPct,pnlAbs,qty:qty||0,avg:avg||marketPrice||0,inputType:"value_pct"};
  }

  // Normal format: SYMBOL quantity avgCost
  let qty=nonPct[0].value;
  let avg=(nonPct[1]&&nonPct[1].value)||marketPrice||0;
  if(symbol&&qty>0)return {symbol,qty,avg,inputType:"qty_avg"};
  return null;
}
function normalizePortfolioRows(rows){

    let qty=r.qty||r.quantity||r.Quantity||r.QTY||r["الكمية"]||r["عدد الأسهم"]||r["Qty"];
    let avg=r.avg||r.avgCost||r.average||r.price||r.cost||r["متوسط التكلفة"]||r["متوسط الشراء"]||r["سعر الشراء"]||r["Avg Cost"]||r["Avg"];

    let pnlAbs=r.pnl||r["P/L"]||r["Profit/Loss"]||r["الربح/الخسارة"]||r["الربح والخسارة"];
    if(!symbol){ 
      const parsed=parseSmartPortfolioLine(Object.values(r).join(" "));
      if(parsed) out.push(parsed);
      return; 
    }
    symbol=cleanSymbol(symbol);
    const row=findMarketRow(symbol);
    const marketPrice=num(row&&row.price)||0;
    value=num(value);
    pnlPct=normalizePercentToken(pnlPct);
    pnlAbs=num(pnlAbs);
    if(symbol && value && (pnlPct!=null || pnlAbs!=null || (!qty&&!avg))){
      let cost=null, pnl=null, q=null, a=null;
      if(pnlPct!=null && pnlPct!==-100){cost=value/(1+pnlPct/100);pnl=value-cost}
      else if(pnlAbs!=null){pnl=pnlAbs;cost=value-pnlAbs}

    avg=num(avg)||marketPrice||0;
    if(symbol&&qty>0)out.push({symbol,qty,avg,inputType:"qty_avg"});
  });
  return out;
}

function parsePortfolioText(text){
  const out=[];
  const lines=String(text||"").split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  lines.forEach(line=>{
    const parsed=parseSmartPortfolioLine(line);
    if(parsed) out.push(parsed);
  });
  return out;
}

function parseDelimitedText(text){
  const lines=String(text||"").split(/\\r?\\n/).map(x=>x.trim()).filter(Boolean);
  if(!lines.length)return [];
  const splitter=lines[0].includes("\\t")?/\\t/:lines[0].includes(";")?/;/:/,/;
  const first=lines[0].split(splitter).map(x=>x.trim().replace(/^["']|["']$/g,""));
  const hasHeader=first.some(x=>/symbol|ticker|qty|quantity|avg|cost|price|رمز|كود|كمية|سعر|متوسط|تكلفة|السهم/i.test(x));
  if(hasHeader){
    const headers=first;
    return lines.slice(1).map(line=>{
      const cells=line.split(splitter).map(x=>x.trim().replace(/^["']|["']$/g,""));
      const obj={}; headers.forEach((h,i)=>obj[h]=cells[i]); return obj;
    });
  }
  return lines.map(line=>line.split(splitter).map(x=>x.trim().replace(/^["']|["']$/g,"")));
}

function loadScriptOnce(src,globalName){
  return new Promise((resolve,reject)=>{
    if(globalName && window[globalName]) return resolve(window[globalName]);
    const existing=[...document.scripts].find(s=>s.src===src);
    if(existing){existing.addEventListener("load",()=>resolve(globalName?window[globalName]:true));existing.addEventListener("error",reject);return}
    const s=document.createElement("script");s.src=src;s.async=true;
    s.onload=()=>resolve(globalName?window[globalName]:true);
    s.onerror=()=>reject(new Error("تعذر تحميل المكتبة الخارجية"));
    document.head.appendChild(s);
  });
}

function rawHistoryFor(symbol){
  symbol=String(symbol||"").toUpperCase();
  const h=EGX.history||{};
  const candidates=[];
  if(Array.isArray(h)) candidates.push(h);
  if(Array.isArray(h.rows)) candidates.push(h.rows);
  if(Array.isArray(h.data)) candidates.push(h.data);
  if(h.sessionsBySymbol&&Array.isArray(h.sessionsBySymbol[symbol])) candidates.push(h.sessionsBySymbol[symbol]);
  if(h.prices&&Array.isArray(h.prices[symbol])) candidates.push(h.prices[symbol]);
  if(h.history&&Array.isArray(h.history[symbol])) candidates.push(h.history[symbol]);
  if(h.symbols&&h.symbols[symbol]&&Array.isArray(h.symbols[symbol])) candidates.push(h.symbols[symbol]);
  if(Array.isArray(h[symbol])) candidates.push(h[symbol]);
  for(const arr of candidates){
    const filtered=arr.filter(x=>{
      if(typeof x==="number")return true;
      const s=String(x.symbol||x.ticker||x.code||x.Symbol||"").toUpperCase();
      return !s || s===symbol;
    });
    if(filtered.length)return filtered;
  }
  return [];
}
function normalizeHistoryPoint(p,i,prevClose){
  if(typeof p==="number"){
    const close=num(p)||prevClose||0;
    return {date:String(i+1),open:prevClose||close,high:Math.max(prevClose||close,close)*1.006,low:Math.min(prevClose||close,close)*.994,close,volume:null,actual:true};
  }
  const close=num(p.close||p.price||p.value||p.last||p.Last||p.Close||p["إغلاق"]||p["السعر"])||prevClose||0;
  const open=num(p.open||p.Open||p["فتح"])||prevClose||close;
  const high=num(p.high||p.High||p.max||p["أعلى"])||Math.max(open,close)*1.006;
  const low=num(p.low||p.Low||p.min||p["أدنى"])||Math.min(open,close)*.994;
  const volume=num(p.volume||p.Volume||p.vol||p["الحجم"]||p.tradedVolume)||null;
  const date=p.date||p.sessionDate||p.t||p.time||p.timestamp||p.Date||String(i+1);
  return {date:String(date).slice(0,10),open,high,low,close,volume,actual:true};
}
function historyPoints(row,limit=50){
  const raw=rawHistoryFor(row.symbol);
  let pts=[], prev=null;
  raw.forEach((p,i)=>{const pt=normalizeHistoryPoint(p,i,prev); if(pt.close>0){pts.push(pt); prev=pt.close}});
  pts=pts.slice(-limit);
  if(pts.length>=2)return pts;
  const p=num(row.price)||10,s=num(row.support1)||p*.96,t=num(row.target1)||p*1.05,r=num(row.resistance1)||t;
  const vals=[s,p*.97,p*.99,p*1.01,p*.995,p*1.025,p*1.015,p*1.035,r,p*1.02,t].filter(x=>x>0);
  return vals.map((close,i)=>{const open=i?vals[i-1]:close*(.995+((i%3)*.003));return{date:"Derived "+(i+1),open,high:Math.max(open,close)*(1+.006+((i%4)*.002)),low:Math.min(open,close)*(1-.006-((i%5)*.001)),close,volume:(num(row.volume)||100000)*(0.65+((i%7)*.11)),actual:false}});
}
function historyStatus(row){
  const rawCount=rawHistoryFor(row.symbol).length;
  const actual=Math.min(50,rawCount);
  const pts=historyPoints(row,50);
  const hasActual=pts.length&&pts.every(p=>p.actual)&&actual>=2;
  const full=hasActual&&actual>=50;
  return {rawCount,actual,points:pts.length,hasActual,full,mode:full?"50 جلسة فعلية":hasActual?`سجل فعلي غير مكتمل ${actual}/50`:"شارت مشتق وليس تاريخ فعلي"};
}

}
function historyStats(row){
  const st=historyStatus(row), pts=historyPoints(row,50);
  const ind=(EGX.historyIndicators&&EGX.historyIndicators.indicators&&EGX.historyIndicators.indicators[row.symbol])||row||{};
  if(ind.sessionsAvailable){
    return {
      st,
      ret20:ind.return20??null,
      ret50:ind.return50??null,
      volatility:ind.volatility20??null,
      volRatio:ind.volumeRatio20??null,
      used:!!ind.historyUsedInAnalysis,
      ema20:ind.ema20??null,
      ema50:ind.ema50??null,
      rsi14:ind.rsi14??null,
      atr14:ind.atr14??null,
      historyScore:ind.historyScore??null,
      history50UsedInRecommendation:!!ind.history50UsedInRecommendation
    }
  }
  if(!st.hasActual||pts.length<2)return {st,ret20:null,ret50:null,volatility:null,volRatio:null,used:false,history50UsedInRecommendation:false};
  const last=pts[pts.length-1].close;
  const p20=pts[Math.max(0,pts.length-21)].close;
  const first=pts[0].close;
  const ret20=p20?((last-p20)/p20*100):null;
  const ret50=first?((last-first)/first*100):null;
  const rets=[];
  for(let i=1;i<pts.length;i++){if(pts[i-1].close)rets.push((pts[i].close-pts[i-1].close)/pts[i-1].close*100)}
  const avg=rets.reduce((a,b)=>a+b,0)/Math.max(1,rets.length);
  const variance=rets.reduce((s,x)=>s+Math.pow(x-avg,2),0)/Math.max(1,rets.length);
  const vols=pts.map(p=>num(p.volume)).filter(x=>x);
  const v20=vols.slice(-20).reduce((a,b)=>a+b,0)/Math.max(1,vols.slice(-20).length);
  const v50=vols.reduce((a,b)=>a+b,0)/Math.max(1,vols.length);
  return {st,ret20,ret50,volatility:Math.sqrt(variance),volRatio:v50?v20/v50:null,used:pts.length>=20,history50UsedInRecommendation:pts.length>=50};
}

ocus-band"><div class="focus-card"><h4>قوة الفرص</h4><div class="muted">عدد فرص الشراء والقريبة من الدخول: <b class="pos">${fmt0(p.buy)}</b></div></div><div class="focus-card"><h4>جودة التغطية</h4><div class="muted">الكاش الحالي: <b>${fmt0(EGX.source.cacheRows||p.rows)}</b> / ${fmt0(EGX.source.totalUniverse||p.rows)}</div></div><div class="focus-card"><h4>توصية عامة</h4><div class="muted">${p.status==="إيجابي انتقائي"?"انتقاء الأسهم داخل مناطق الدخول فقط.":"الانتظار أفضل حتى تتحسن الثقة."}</div></div></div></div></section>`}
function sectorStats(){const m=new Map();EGX.rows.forEach(r=>{const s=r.sector||"غير مصنف";if(!m.has(s))m.set(s,{sector:s,count:0,sum:0,value:0});const x=m.get(s);x.count++;x.sum+=num(r.changePct)||0;x.value+=num(r.valueTraded)||0});return Array.from(m.values()).map(x=>({...x,avg:x.count?x.sum/x.count:0})).sort((a,b)=>b.value-a.value)}
function parsePortfolio(){return parsePortfolioText(EGX.portfolioText)}

function portfolioRows(){
  return parsePortfolio().map(p=>{
    const r=findMarketRow(p.symbol)||{symbol:p.symbol,name_ar:p.symbol,price:p.avg||0,finalConfidence:0,recommendation:"غير متاح",signal:"WATCH",stopLoss:null,target1:null};
    const marketPrice=num(r.price)||num(p.avg)||0;
    let qty=num(p.qty)||0, avg=num(p.avg)||marketPrice, val=0, cost=0, pnl=0, pnlPct=0;

    if(p.inputType==="value_pct" || p.value){
      val=num(p.value)||0;
      pnlPct=normalizePercentToken(p.pnlPct);
      if(pnlPct!=null && pnlPct!==-100){
        cost=val/(1+pnlPct/100);
        pnl=val-cost;
      }else if(num(p.pnlAbs)!=null){
        pnl=num(p.pnlAbs);
        cost=val-pnl;
        pnlPct=cost?pnl/cost*100:0;
      }else{
        cost=val;
        pnl=0;
        pnlPct=0;
      }
      if(marketPrice>0){
        qty=val/marketPrice;
        avg=qty?cost/qty:marketPrice;
      }
    }else{
      val=marketPrice*qty;
      cost=avg*qty;
      pnl=val-cost;
      pnlPct=cost?pnl/cost*100:0;
    }

    return {...r,...p,qty,avg,price:marketPrice,val,cost,pnl,pnlPct,weight:0};
  })
}


function portfolioModeStats(h){
  const valueMode=h.filter(r=>r.inputType==="value_pct"||r.value).length;
  const qtyMode=h.length-valueMode;
  return {valueMode,qtyMode,mode:valueMode>=qtyMode?"كشف قيمة/نسبة":"كمية/متوسط تكلفة"};
}
function portfolioAction(r){
  if(sclass(r)==="risk")return "تخفيف / مراجعة";
  if(sclass(r)==="buy")return "زيادة مركز مشروطة";
  if(sclass(r)==="near")return "انتظار دخول مناسب";
  return "احتفاظ";
}
function portfolioClassification(r){
  if(r.inputType==="value_pct"||r.value)return '<span class="broker-badge value">قيمة + نسبة</span>';
  return '<span class="broker-badge qty">كمية + تكلفة</span>';
}

function portfolio(){
  let h=portfolioRows();
  const total=h.reduce((s,r)=>s+(num(r.val)||0),0);
  const cost=h.reduce((s,r)=>s+(num(r.cost)||0),0);
  const pnl=total-cost;
  const stats=portfolioModeStats(h);

function liquidityScore(r){
  const v=num(r.valueTraded)||0;
  const vol=num(r.volume)||0;
  const price=num(r.price)||0;
  const base=Math.log10(v+1)*10;
  const depth=Math.log10(vol+1)*5;
  const quality=(num(r.dataQualityScore)||70)*0.15;
  return Math.max(0,Math.min(100,Math.round(base+depth+quality+(price>0?5:0))));
}
function volumeScore(r){
  const vol=num(r.volume)||0;
  const value=num(r.valueTraded)||0;
  const conf=num(r.finalConfidence)||0;
  return Math.max(0,Math.min(100,Math.round(Math.log10(vol+1)*11+Math.log10(value+1)*3+conf*.12)));
}
function distancePct(price,level){
  price=num(price); level=num(level);
  if(!price||!level)return null;
  return (price-level)/price*100;
}
function supportResistanceSignal(r){
  const p=num(r.price), s=num(r.support1), res=num(r.resistance1), e1=num(r.entryFrom), e2=num(r.entryTo);
  if(!p)return "بيانات غير كافية";
  if(e1&&e2&&p>=e1*.985&&p<=e2*1.015)return "داخل منطقة الدخول";
  if(s&&Math.abs((p-s)/p*100)<=3)return "قريب من الدعم";
  if(res&&Math.abs((res-p)/p*100)<=3)return "قريب من المقاومة";
  if(res&&p>res)return "اختراق مقاومة";
  return "متابعة";
}

function v77PortfolioRows(){try{return portfolioRows().map(r=>({...r,scope:"portfolio"}))}catch(e){return[]}}
function v77WatchRows(){return(EGX.watchlist||[]).map(s=>EGX.rows.find(r=>r.symbol===s)).filter(Boolean).map(r=>({...r,scope:"watchlist"}))}
function v77InPortfolio(symbol){return v77PortfolioRows().some(r=>r.symbol===symbol)}
function v77ScopeLabel(scope){return scope==="portfolio"?"المحفظة":scope==="watchlist"?"الرقابة":scope==="opportunity"?"فرص":"السوق"}
function v77PriorityRank(p){return {"عاجل":0,"مهم":1,"مراقبة":2,"معلومة":3}[p]??9}
function v77Liquidity(r){const v=num(r.valueTraded)||0,vol=num(r.volume)||0;return Math.max(0,Math.min(100,Math.round(Math.log10(v+1)*9+Math.log10(vol+1)*3)))}
function v77Technical(r){const p=num(r.price)||0,e1=num(r.entryFrom)||0,e2=num(r.entryTo)||0,s=num(r.support1)||0,t=num(r.target1)||0;let sc=50;if(e1&&e2&&p>=e1*.985&&p<=e2*1.015)sc+=22;if(s&&p>s)sc+=8;if(t&&p<t)sc+=5;if(rr(r)>=2)sc+=10;if((num(r.changePct)||0)>0)sc+=5;return Math.max(0,Math.min(100,Math.round(sc)))}
function v77Readiness(r){
  const conf=num(r.finalConfidence)||0,liq=v77Liquidity(r),tech=v77Technical(r),snap=num(r.snapshotEvidenceScore)||((num(r.snapshotEvidenceCount)||0)>10?60:35);
  let entry=40,p=num(r.price)||0,e1=num(r.entryFrom)||0,e2=num(r.entryTo)||0;
  if(e1&&e2&&p>=e1*.985&&p<=e2*1.015)entry=100;
  else if(e1&&p<e1&&((e1-p)/e1*100)<=4)entry=78;
  else if(e2&&p>e2&&((p-e2)/e2*100)<=4)entry=65;
  const score=Math.round(conf*.35+tech*.25+liq*.18+entry*.14+snap*.08);
  return Math.max(0,Math.min(100,score))
}

function v78SectorStats(){
  const map=new Map();

    if(!map.has(sec))map.set(sec,{sector:sec,rows:[],count:0,totalValue:0,totalVolume:0,changeSum:0,confSum:0,buy:0,risk:0,watch:0,snapshot:0});

    if(r.snapshotEvidenceUsed)g.snapshot++;
  });
  return [...map.values()].map(g=>{
    const avgChange=g.count?g.changeSum/g.count:0,avgConf=g.count?g.confSum/g.count:0,buyRatio=g.count?g.buy/g.count*100:0,riskRatio=g.count?g.risk/g.count*100:0,snapRatio=g.count?g.snapshot/g.count*100:0;
    const liq=Math.max(0,Math.min(100,Math.round(Math.log10(g.totalValue+1)*7)));
    const momentum=Math.max(0,Math.min(100,50+avgChange*8));
    const rotation=Math.round(Math.max(0,Math.min(100,avgConf*.28+liq*.25+momentum*.22+buyRatio*.15+snapRatio*.06-riskRatio*.10)));
    const best=g.rows.slice().sort((a,b)=>(v77Readiness? v77Readiness(b)-v77Readiness(a) : (num(b.finalConfidence)||0)-(num(a.finalConfidence)||0)))[0]||{};
    return{...g,avgChange,avgConf,buyRatio,riskRatio,snapRatio,liquidityScore:liq,momentumScore:momentum,rotationScore:rotation,best}
  }).sort((a,b)=>b.rotationScore-a.rotationScore)
}

function v79ImpactClass(x){x=num(x)||0;return x>8?"pos":x<-8?"neg":"neu"}

function v710TrustedSource(x){
  if(x.trustedNewsSource===true||x.trusted===true||x.sourceTrust==="trusted")return true;

  const url=String(x.url||x.link||"");
  if(!url)return false;
  try{
    const host=new URL(url, location.href).hostname.replace(/^www\./,"").toLowerCase();
    const allow=["egx.com.eg","egx.com","mubasher.info","english.mubasher.info","reuters.com","zawya.com","arabfinance.com","alborsaanews.com","cnbcarabia.com","enterprise.press"];

  }catch(e){return false}
}

  return localStorage.getItem("egx_pwa_installed")==="1" || window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone===true;
}
function egxHidePwaInstallUi(){
  try{document.body.classList.add("egx-pwa-installed")}catch(_){}
  ["installPwaBtn","egxPwaFloatingInstall","pwaHint","egxPwaInstallPanel"].forEach(id=>{const el=document.getElementById(id);if(el)el.remove()});
  document.querySelectorAll(".pwa-floating-install,.pwa-install-hint,.pwa-install-panel").forEach(el=>el.remove());
}
function egxApplyPwaUiState(){
  if(egxPwaInstalled()){egxHidePwaInstallUi();return true}
  try{document.body.classList.remove("egx-pwa-installed")}catch(_){}
  return false;
}
window.addEventListener("appinstalled",()=>{localStorage.setItem("egx_pwa_installed","1");egxHidePwaInstallUi()});
window.addEventListener("DOMContentLoaded",()=>setTimeout(egxApplyPwaUiState,200));
setInterval(egxApplyPwaUiState,3000);

function v715AgeMinutes(ts){
  if(!ts)return null;
  const t=new Date(ts).getTime();
  if(!isFinite(t))return null;
  return Math.max(0,Math.round((Date.now()-t)/60000));
}
function v715State(ok,warn,bad){
  if(bad)return "bad";
  if(warn)return "warn";
  return ok?"ok":"warn";
}
function v715StateText(s){return s==="ok"?"OK":s==="bad"?"FAILED":"WARNING"}
function v715HealthCard(title,state,metrics,note){
  return`<div class="health-card ${state}"><h3><span>${esc(title)}</span><span class="state">${v715StateText(state)}</span></h3><div class="health-metrics">${metrics.map(m=>`<div><span>${esc(m[0])}</span><b>${esc(m[1])}</b></div>`).join("")}</div>${note?`<div class="health-note">${esc(note)}</div>`:""}</div>`
}

  return {score:Math.round(score),state:marketBad?"bad":score<75?"warn":"ok",age};

/* ===================== V8.1 Stability QA ===================== */
function v717AckStore(){try{return JSON.parse(localStorage.getItem("egx_v717_alert_ack")||"{}")}catch(e){return{}}}
function v717SaveAck(x){localStorage.setItem("egx_v717_alert_ack",JSON.stringify(x||{}))}
function v717AlertId(a){return [a.category||"",a.symbol||"",a.title||"",a.level||""].join("|").replace(/\s+/g,"_").slice(0,160)}
function v717SeverityText(x){return x==="urgent"?"عاجل":x==="important"?"مهم":x==="watch"?"مراقبة":"معلومة"}
function v717DistancePct(a,b){a=num(a);b=num(b);if(!a||!b)return null;return ((a-b)/b)*100}
function v717PortfolioSymbols(){
  const set=new Set();
  try{
    const text=EGX.portfolioText||localStorage.getItem("egx_v61_portfolio")||"";
    if(typeof parsePortfolioText==="function"){
      parsePortfolioText(text).forEach(x=>{if(x.symbol)set.add(String(x.symbol).toUpperCase())});
    }
  }catch(e){}
  return set;
}
function v717TrustedNewsFor(r){
  const arr=(EGX.newsIntel&&Array.isArray(EGX.newsIntel.items))?EGX.newsIntel.items:[];
  return arr.filter(x=>String(x.symbol||"").toUpperCase()===String(r.symbol||"").toUpperCase() && (x.trusted===true || x.sourceTrust==="trusted" || /^https?:\/\//.test(String(x.url||""))));
}
function v717PushAlert(list,a){
  a.level=a.level||"watch";a.score=a.score||0;a.id=v717AlertId(a);list.push(a);
}
function v717SmartAlerts(){
  const alerts=[], portfolio=v717PortfolioSymbols(), watch=new Set((EGX.watchlist||[]).map(x=>String(x).toUpperCase()));
  const health=typeof v715OverallHealth==="function"?v715OverallHealth():{score:100,state:"ok"};
  if(health.state==="bad")v717PushAlert(alerts,{level:"urgent",category:"صحة التطبيق",title:"خلل رئيسي في صحة البيانات",text:"مركز صحة التطبيق يشير إلى حالة FAILED. لا تعتمد على التوصيات قبل مراجعة صحة التطبيق.",score:100,action:"افتح صحة التطبيق",screen:"sources"});
  else if(health.state==="warn")v717PushAlert(alerts,{level:"important",category:"صحة التطبيق",title:"نقص في طبقات الثقة",text:"توجد تحذيرات في الأخبار أو التاريخ أو دقة التوصيات. راجع صحة التطبيق قبل اتخاذ قرار.",score:78,action:"افتح صحة التطبيق",screen:"sources"});
  EGX.rows.forEach(r=>{
    const p=num(r.price), stop=num(r.stopLoss), t1=num(r.target1), t2=num(r.target2), e1=num(r.entryFrom), e2=num(r.entryTo), conf=num(r.finalConfidence)||0;
    if(!p)return;
    const isPort=portfolio.has(String(r.symbol).toUpperCase()), isWatch=watch.has(String(r.symbol).toUpperCase());
    const context=isPort?"محفظة":isWatch?"رقابة":"فرصة";
    const stopDist=stop?v717DistancePct(p,stop):null;
    const t1Dist=t1?v717DistancePct(t1,p):null;
    if(stop && p<=stop*1.015)v717PushAlert(alerts,{level:"urgent",category:context,symbol:r.symbol,title:"السعر عند/تحت منطقة وقف الخسارة",text:`السعر ${fmt(p)} قريب جدًا من الوقف ${fmt(stop)}. راجع القرار فورًا ولا تؤجل إدارة المخاطر.`,score:98,action:"تفاصيل السهم"});
    else if(stopDist!=null && stopDist<=4)v717PushAlert(alerts,{level:"important",category:context,symbol:r.symbol,title:"قريب من وقف الخسارة",text:`المسافة إلى الوقف تقريبًا ${fmt(stopDist,1)}%. راجع حجم المركز وخطة الخروج.`,score:82,action:"تفاصيل السهم"});
    if(t1 && p>=t1*.99)v717PushAlert(alerts,{level:"important",category:context,symbol:r.symbol,title:"قريب من الهدف الأول",text:`السعر ${fmt(p)} قريب من هدف 1 عند ${fmt(t1)}. راجع جني جزء أو رفع الوقف.`,score:76,action:"تفاصيل السهم"});
    if(t2 && p>=t2*.985)v717PushAlert(alerts,{level:"important",category:context,symbol:r.symbol,title:"قريب من الهدف الثاني",text:`السعر قريب من هدف 2 عند ${fmt(t2)}. لا تترك الربح يتحول لمخاطرة.`,score:84,action:"تفاصيل السهم"});
    if(e1&&e2&&p>=e1*.995&&p<=e2*1.005&&conf>=70)v717PushAlert(alerts,{level:conf>=85?"important":"watch",category:isWatch?"رقابة":"فرصة",symbol:r.symbol,title:"داخل منطقة دخول مشروطة",text:`السعر ${fmt(p)} داخل نطاق الدخول ${fmt(e1)} - ${fmt(e2)} والثقة ${fmt0(conf)}%.`,score:conf>=85?80:62,action:"تفاصيل السهم"});
    if(!isPort&&!isWatch&&conf>=88&&sclass(r)!=="risk")v717PushAlert(alerts,{level:"watch",category:"فرصة",symbol:r.symbol,title:"فرصة عالية الثقة",text:`الثقة ${fmt0(conf)}% مع توصية ${r.recommendation||actionClassText(r)}. تصلح للإضافة لقائمة الرقابة قبل التنفيذ.`,score:66,action:"إضافة للرقابة"});
    if(sclass(r)==="risk")v717PushAlert(alerts,{level:isPort?"urgent":"important",category:context,symbol:r.symbol,title:"إشارة تخفيف مخاطر",text:r.reason||"التصنيف الحالي يشير إلى مخاطرة أعلى من الطبيعي.",score:isPort?94:74,action:"تفاصيل السهم"});
    const news=v717TrustedNewsFor(r);
    news.forEach(n=>{
      const impact=num(n.impactScore)||0;
      if(impact<=-20 && (isPort||isWatch||conf>=75))v717PushAlert(alerts,{level:isPort?"urgent":"important",category:"خبر موثوق",symbol:r.symbol,title:"خبر موثوق سلبي",text:`${n.title||"خبر سلبي"} — التأثير ${fmt0(impact)}. راجع الخبر قبل أي قرار.`,score:isPort?96:82,url:n.url,action:"فتح الخبر"});
      if(impact>=20 && (isWatch||conf>=80))v717PushAlert(alerts,{level:"watch",category:"خبر موثوق",symbol:r.symbol,title:"خبر موثوق إيجابي",text:`${n.title||"خبر إيجابي"} — التأثير ${fmt0(impact)}. لا يعتمد وحده بدون السعر والسيولة.`,score:68,url:n.url,action:"فتح الخبر"});

  });
  const seen=new Set();
  return alerts.filter(a=>{if(seen.has(a.id))return false;seen.add(a.id);return true}).sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,120);

function smartAlerts(){return v717SmartAlerts()}

  return 30;
}
function v800LiquidityScore(r){
  const val=num(r.valueTraded)||0, vol=num(r.volume)||0;
  if(val>=100000000)return 100;
  if(val>=50000000)return 86;
  if(val>=20000000)return 72;
  if(val>=10000000)return 60;
  if(val>=3000000)return 45;
  if(vol>0)return 35;
  return 20;
}
function v800TechnicalScore(r){
  const conf=num(r.finalConfidence)||num(r.confidence)||0;
  const priceAction=num(r.priceActionScore);
  const sr=num(r.supportResistanceScore)||num(r.supportResistanceComposite)||0;
  const snap=num(r.snapshotEvidenceScore)||0;
  let score=conf*.45 + (priceAction||conf)*.20 + (sr||conf)*.20 + (snap||0)*.15;
  if(sclass(r)==="buy")score+=6;
  if(sclass(r)==="near")score+=2;
  if(sclass(r)==="risk")score-=18;
  return v800Clamp(score);
}
function v800HistoryScore(r){
  const complete=!!r.historyComplete50||!!r.history50UsedInRecommendation, actual=num(r.historySessionsAvailable)||num(r.historyActualSessions)||0, score=num(r.historyScore);
  if(complete)return v800Clamp(score||90);
  if(actual>=30)return v800Clamp(score||75);
  if(actual>=10)return v800Clamp(score||58);
  if(actual>0)return v800Clamp(40+actual);
  if(r.snapshotEvidenceUsed)return v800Clamp(55+(num(r.snapshotEvidenceScore)||0)*.25);
  return 32;
}
function v800NewsScore(r){
  if(r.newsUsedInScore)return v800Clamp(50+(num(r.newsImpactScore)||0)*.5);
  const n=num(r.newsImpactScore);
  if(n!=null&&n!==0)return v800Clamp(50+n*.25);
  return 50;
}
function v800RiskPenalty(r){
  let p=0;
  const price=num(r.price), stop=num(r.stopLoss), conf=num(r.finalConfidence)||0;
  if(sclass(r)==="risk")p+=24;
  if(conf<60)p+=8;
  if(price&&stop){
    const d=(price-stop)/stop*100;
    if(d<=2)p+=18;
    else if(d<=5)p+=10;
  }
  if(r.newsUsedInScore && (num(r.newsImpactScore)||0)<-20)p+=12;
  if((num(r.dataQualityScore)||100)<70)p+=10;
  return v800Clamp(p,0,55);
}
function v800ScoreRow(r){
  const technical=v800TechnicalScore(r);
  const liquidity=v800LiquidityScore(r);
  const rrScore=v800RRScore(r);
  const history=v800HistoryScore(r);
  const news=v800NewsScore(r);
  const quality=v800NormScore(r.dataQualityScore||EGX.source.avgDataQuality||100);
  const penalty=v800RiskPenalty(r);
  const score=v800Clamp(technical*.32 + liquidity*.18 + rrScore*.16 + history*.14 + news*.10 + quality*.10 - penalty*.55);

  const action=grade==="A"&&sclass(r)!=="risk"?"فرصة مؤسسية مشروطة":grade==="B"?"مراقبة قوية":grade==="C"?"مراقبة فقط":"استبعاد مؤقت / مخاطرة";
  const reasons=[];
  if(technical>=75)reasons.push("زخم/توقيت جيد");
  if(liquidity>=70)reasons.push("سيولة مناسبة");
  if(rrScore>=70)reasons.push("عائد/مخاطرة مقبول");

  if(news<40)reasons.push("ضغط خبري/إشارة سلبية");
  if(penalty>=20)reasons.push("مخاطر تحتاج مراجعة");
  return {symbol:r.symbol,score:Math.round(score),grade,action,technical:Math.round(technical),liquidity:Math.round(liquidity),rrScore:Math.round(rrScore),history:Math.round(history),news:Math.round(news),quality:Math.round(quality),penalty:Math.round(penalty),reasons,row:r};
}

function v81RunClientQA(){

    }catch(e){add("screen:"+label,false,e.message)}
  });
  EGX.screen=oldScreen;
  const failed=tests.filter(x=>!x.ok);
  const warnings=[];
