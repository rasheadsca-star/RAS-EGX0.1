<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EGX Pro Hub — GOAL Decision Center</title>
  <meta name="description" content="لوحة قرار متكاملة للبورصة المصرية مبنية على بيانات عامة ومتأخرة مع بوابة جودة وBacktesting." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">EGX</div>
        <div>
          <h1>EGX Pro Hub</h1>
          <p>GOAL Decision Center</p>
        </div>
      </div>
      <nav class="nav-list" aria-label="القائمة الرئيسية">
        <button class="nav active" data-view="dashboard">لوحة القرار</button>
        <button class="nav" data-view="today">قرار اليوم</button>
        <button class="nav" data-view="opportunities">الفرص التفصيلية</button>
        <button class="nav" data-view="excluded">المستبعدة ولماذا</button>
        <button class="nav" data-view="liquidity">السيولة</button>
        <button class="nav" data-view="support">الدعم والمقاومة</button>
        <button class="nav" data-view="backtest">قياس الدقة</button>
        <button class="nav" data-view="sources">جودة البيانات</button>
        <button class="nav" data-view="dailyReport">التقرير اليومي</button>
        <button class="nav" data-view="settings">الإعدادات</button>
      </nav>
      <div class="sidebar-note">
        بيانات عامة ومتأخرة. الأداة مساعد قرار فقط وليست مستشارًا ماليًا ولا تنفّذ أوامر تداول.
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="viewTitle">لوحة القرار</h2>
          <p id="viewSubtitle">قرار واحد واضح: تنفيذ مشروط، مراقبة، أو لا شراء.</p>
        </div>
        <div class="actions">
          <span id="sourceBadge" class="status-pill neutral">جار التحميل</span>
          <button id="reloadData" class="btn">إعادة تحميل</button>
          <a class="btn primary" href="https://github.com/rasheadsca-star/RAS-EGX0.1/actions/workflows/update-market-data.yml" target="_blank" rel="noreferrer">تحديث البيانات</a>
          <button id="exportCsv" class="btn">CSV</button>
          <button id="printPage" class="btn">طباعة</button>
        </div>
      </header>

      <div id="notice" class="notice">جار تحميل ملفات البيانات...</div>

      <section id="dashboard" class="view active"></section>
      <section id="today" class="view"></section>
      <section id="opportunities" class="view"></section>
      <section id="excluded" class="view"></section>
      <section id="liquidity" class="view"></section>
      <section id="support" class="view"></section>
      <section id="backtest" class="view"></section>
      <section id="sources" class="view"></section>
      <section id="dailyReport" class="view"></section>
      <section id="settings" class="view"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
