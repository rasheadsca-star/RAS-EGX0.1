function parsePortfolioText(text){

    const parts=l.split(/[,;\\t ]+/).map(x=>String(x||"").trim()).filter(Boolean);

function parseDelimitedText(text){
  const lines=String(text||"").split(/\\r?\\n/).map(x=>x.trim()).filter(Boolean);
  if(!lines.length)return [];
  const splitter=lines[0].includes("\\t")?/\\t/:lines[0].includes(";")?/;/:/,/;
  const first=lines[0].split(splitter).map(x=>x.trim().replace(/^["']|["']$/g,""));
  const hasHeader=first.some(x=>/symbol|ticker|qty|quantity|avg|cost|price|رمز|كود|كمية|سعر|متوسط|تكلفة|السهم/i.test(x));
  if(hasHeader){
    const headers=first;
    return lines.slice(1).map(line=>{
      const cells=line.split(splitter).map(x=>x.trim().replace(/^["']|["']$/g,""));
      const obj={}; headers.forEach((h,i)=>obj[h]=cells[i]); return obj;
    });
  }
  return lines.map(line=>line.split(splitter).map(x=>x.trim().replace(/^["']|["']$/g,"")));
}
function parseOcrPortfolioText(text){
  const out=[];
  const lines=String(text||"").split(/\\r?\\n/).map(x=>x.trim()).filter(Boolean);
  lines.forEach(line=>{
    const up=line.toUpperCase().replace(/[|]/g," ");
    const symMatch=up.match(/\\b[A-Z]{2,6}(?:\\.[A-Z]{1,3})?\\b/);
    if(!symMatch)return;
    const nums=(up.match(/\\d+(?:[.,]\\d+)?/g)||[]).map(x=>num(x));
    if(nums.length>=2){
      let qty=nums.find(n=>n>=10) || nums[0];
      let avg=nums[nums.length-1];
      if(qty&&avg) out.push({symbol:symMatch[0],qty,avg});
    }
  });
  return out;
}
function loadScriptOnce(src,globalName){
  return new Promise((resolve,reject)=>{
    if(globalName && window[globalName]) return resolve(window[globalName]);
    const existing=[...document.scripts].find(s=>s.src===src);
    if(existing){existing.addEventListener("load",()=>resolve(globalName?window[globalName]:true));existing.addEventListener("error",reject);return}
    const s=document.createElement("script");s.src=src;s.async=true;
    s.onload=()=>resolve(globalName?window[globalName]:true);
    s.onerror=()=>reject(new Error("تعذر تحميل المكتبة الخارجية"));
    document.head.appendChild(s);
  });
}
async function handleExcelImport(file){
  if(!file)return;
  const name=file.name||"";
  setImportStatus("excelStatus","جاري قراءة الملف...","")
  try{
    let rows=[];
    if(/\\.csv$/i.test(name)){
      const text=await file.text();
      rows=normalizePortfolioRows(parseDelimitedText(text));
    }else{
      await loadScriptOnce("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js","XLSX");
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:"array"});
      const sheet=wb.Sheets[wb.SheetNames[0]];
      rows=normalizePortfolioRows(XLSX.utils.sheet_to_json(sheet,{defval:""}));
      if(!rows.length){
        const arr=XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});
        rows=normalizePortfolioRows(arr);
      }
    }
    if(!rows.length){setImportStatus("excelStatus","لم أجد أعمدة واضحة. المطلوب: Symbol / Quantity / Avg Cost أو الرمز / الكمية / متوسط التكلفة.","bad");return}
    EGX.portfolioText=mergePortfolioText(rowsToPortfolioText(rows));
    localStorage.setItem("egx_v61_portfolio",EGX.portfolioText);
    setImportStatus("excelStatus",`تم استيراد ${rows.length} مركز بنجاح. تمت إضافتها للمحفظة.`,"good");
    render();
  }catch(e){setImportStatus("excelStatus","فشل استيراد Excel/CSV: "+esc(e.message||e),"bad")}
}
async function handleImageImport(file){
  if(!file)return;
  const img=document.getElementById("ocrPreview");
  if(img) img.src=URL.createObjectURL(file);
  setImportStatus("ocrStatus","جاري تحميل OCR... قد يستغرق دقيقة حسب حجم الصورة.","")
  try{
    await loadScriptOnce("https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js","Tesseract");
    const worker=await Tesseract.createWorker("eng+ara",1,{
      logger:m=>{
        if(m&&m.status) setImportStatus("ocrStatus",`OCR: ${esc(m.status)} ${m.progress?Math.round(m.progress*100)+"%":""}`,"");
      }
    });
    const result=await worker.recognize(file);
    await worker.terminate();
    const raw=(result&&result.data&&result.data.text)||"";
    const rows=parseOcrPortfolioText(raw);
    const ocr=document.getElementById("ocrText");
    if(ocr) ocr.value=rowsToPortfolioText(rows) || raw;
    if(rows.length){
      setImportStatus("ocrStatus",`تم استخراج ${rows.length} مركز من الصورة. راجع النص ثم اضغط "اعتماد النص المستخرج".`,"good");
    }else{
      setImportStatus("ocrStatus","تمت قراءة الصورة لكن لم أتعرف على مراكز واضحة. عدّل النص يدويًا بصيغة SYMBOL,QUANTITY,AVG_COST.","bad");
    }
  }catch(e){
    setImportStatus("ocrStatus","تعذر تشغيل OCR من المتصفح. يمكنك كتابة المراكز يدويًا أو رفع CSV/Excel. السبب: "+esc(e.message||e),"bad");
  }
}

function actionClassText(r){const c=sclass(r);if(c==="buy")return"زيادة/دخول مشروط";if(c==="near")return"مراقبة دخول";if(c==="risk")return"تخفيف مخاطر";return"احتفاظ / انتظار تأكيد"}
function topMovers(){return sorted().slice().sort((a,b)=>(num(b.changePct)||0)-(num(a.changePct)||0)).slice(0,5)}
function topLiquidity(){return sorted().slice().sort((a,b)=>(num(b.valueTraded)||0)-(num(a.valueTraded)||0)).slice(0,5)}
function riskList(){return sorted().filter(r=>sclass(r)==="risk" || (num(r.price)&&num(r.stopLoss)&&num(r.price)<=num(r.stopLoss)*1.03)).slice(0,5)}
function compactList(title, rows, type){return`<div class="panel"><h3>${title}</h3>${rows.map((r,i)=>`<div class="quickrow"><b>${i+1}</b><div><b>${esc(r.symbol)}</b><br><small>${esc(r.name_ar||"")}</small></div><span class="${type==="risk"?"neg":(num(r.changePct)||0)>=0?"pos":"neg"}">${type==="liquidity"?fmtCompact(r.valueTraded):type==="risk"?esc(actionClassText(r)):pct(r.changePct)}</span></div>`).join("")||'<div class="muted">لا توجد بيانات كافية.</div>'}</div>`}


function saveWatchlist(){localStorage.setItem("egx_v64_watchlist",JSON.stringify(EGX.watchlist||[]))}
function inWatch(symbol){return (EGX.watchlist||[]).includes(String(symbol||"").toUpperCase())}
function toggleWatch(symbol){symbol=cleanSymbol(symbol);if(!symbol)return;EGX.watchlist=EGX.watchlist||[];if(inWatch(symbol))EGX.watchlist=EGX.watchlist.filter(x=>x!==symbol);else EGX.watchlist.unshift(symbol);saveWatchlist();render()}
function scoreParts(r){
  const conf=num(r.finalConfidence)||0, quality=num(r.dataQualityScore)||0;
  const liq=Math.min(100,Math.round(Math.log10((num(r.valueTraded)||1)+1)*12));
  const trend=Math.max(0,Math.min(100,Math.round(50+(num(r.changePct)||0)*12+(sclass(r)==="buy"?18:sclass(r)==="risk"?-18:0))));
  const risk=Math.max(0,Math.min(100,Math.round(100-((num(r.price)&&num(r.stopLoss))?Math.max(0,(num(r.price)-num(r.stopLoss))/num(r.price)*100):8)*5)));
  const timing=sclass(r)==="near"?88:sclass(r)==="buy"?78:sclass(r)==="risk"?35:58;
  return {liq,trend,risk,timing,total:Math.round((conf*0.35+quality*0.2+liq*0.15+trend*0.15+risk*0.1+timing*0.05))};
}
function commandStrip(){
  const p=pulse(),top=sorted()[0]||{},risky=riskList()[0]||{};
  return `<div class="command-strip"><div class="command-card"><h4>مركز القيادة</h4><b>${esc(p.status)}</b><p>الفرص: ${fmt0(p.buy)} | مراقبة: ${fmt0(p.watch)} | حذر: ${fmt0(p.risk)} | متوسط الثقة: ${fmt0(p.avg)}%</p></div><div class="command-card"><h4>أفضل فرصة</h4><b>${esc(top.symbol||"-")}</b><p>${esc(top.recommendation||"")} — ثقة ${fmt0(top.finalConfidence)}%</p></div><div class="command-card"><h4>أعلى مخاطرة</h4><b>${esc(risky.symbol||"-")}</b><p>${risky.symbol?esc(risky.reason||"مراجعة وقف الخسارة"):"لا توجد إشارات حذر واضحة"}</p></div><div class="command-card"><h4>قائمة مراقبتي</h4><b>${fmt0((EGX.watchlist||[]).length)}</b><p>أسهم محفوظة محليًا للمتابعة السريعة.</p></div></div>`
}
function proDetailButton(symbol){return `<button class="btn" data-pro-detail="${esc(symbol)}">تحليل Pro</button>`}
function openProDrawer(symbol){
  const r=EGX.rows.find(x=>x.symbol===symbol)||selectedRow(), s=scoreParts(r);
  let d=document.getElementById("proDrawer"); if(!d){d=document.createElement("div");d.id="proDrawer";d.className="drawer";document.body.appendChild(d)}
  d.innerHTML=`<div class="drawer-box"><div class="drawer-head"><div><h3>${esc(r.symbol)} — ${esc(r.name_ar||"")} <button class="watch-star ${inWatch(r.symbol)?"active":""}" data-watch-toggle="${esc(r.symbol)}">★</button></h3><p>تحليل مؤسسي مختصر: توقيت، سيولة، اتجاه، مخاطر، وخطة تنفيذ.</p></div><button class="btn warn" id="closeDrawer">إغلاق</button></div><div class="dashgrid"><div class="panel"><h3>الشارت والخطة</h3><div class="chart" style="height:330px">${chartSvg(r)}</div><div class="plan-grid"><div class="plan-card"><h4>الدخول</h4><p>${fmt(r.entryFrom)} - ${fmt(r.entryTo)}</p></div><div class="plan-card"><h4>الأهداف</h4><p>${fmt(r.target1)} ثم ${fmt(r.target2)}</p></div><div class="plan-card"><h4>وقف الخسارة</h4><p>${fmt(r.stopLoss)}</p></div></div></div><div class="panel"><h3>مصفوفة القرار</h3><div class="scoregrid"><div class="score"><span>السيولة</span><b>${s.liq}%</b></div><div class="score"><span>الاتجاه</span><b>${s.trend}%</b></div><div class="score"><span>المخاطر</span><b>${s.risk}%</b></div><div class="score"><span>التوقيت</span><b>${s.timing}%</b></div></div><div class="recbox" style="margin-top:12px"><h4>${esc(r.recommendation)}</h4><div class="circle" style="--p:${s.total}"><b>${s.total}%</b></div></div><div class="signal-timeline" style="margin-top:12px"><div class="signal-item"><b>سبب الفرصة</b><p class="muted">${esc(r.reason||"-")}</p></div><div class="signal-item ${sclass(r)==="risk"?"risk":""}"><b>إدارة المخاطر</b><p class="muted">لا تدخل إلا قرب منطقة الدخول، والتزم بوقف ${fmt(r.stopLoss)}.</p></div><div class="signal-item"><b>تنفيذ مقترح</b><p class="muted">${esc(actionClassText(r))} مع تقسيم السيولة على دفعات.</p></div></div></div></div></div>`;
  d.classList.add("show");
  document.getElementById("closeDrawer").onclick=()=>d.classList.remove("show");
  d.onclick=e=>{if(e.target===d)d.classList.remove("show")}
  d.querySelectorAll("[data-watch-toggle]").forEach(b=>b.onclick=()=>{toggleWatch(b.dataset.watchToggle);openProDrawer(b.dataset.watchToggle)})
}
function smartAlerts(){
  const alerts=[];
  EGX.rows.forEach(r=>{
    const p=num(r.price), stop=num(r.stopLoss), t1=num(r.target1), e1=num(r.entryFrom), e2=num(r.entryTo);
    if(!p)return;
    if(e1&&e2&&p>=e1*.985&&p<=e2*1.015) alerts.push({level:"ok",symbol:r.symbol,title:"داخل منطقة الدخول",text:`السعر ${fmt(p)} قريب من ${fmt(e1)} - ${fmt(e2)}`});
    if(t1&&p>=t1*.985) alerts.push({level:"ok",symbol:r.symbol,title:"قريب من الهدف الأول",text:`مراجعة جني جزء عند ${fmt(t1)}`});
    if(stop&&p<=stop*1.03) alerts.push({level:"risk",symbol:r.symbol,title:"قريب من وقف الخسارة",text:`وقف المراقبة ${fmt(stop)}`});
    if(sclass(r)==="risk") alerts.push({level:"risk",symbol:r.symbol,title:"إشارة تخفيف",text:r.reason||"مراجعة المخاطر"});
  });
  return alerts.slice(0,80);
}
function renderWatchlist(){
  const rows=(EGX.watchlist||[]).map(s=>EGX.rows.find(r=>r.symbol===s)).filter(Boolean);
  return `${header("قوائم المراقبة","قائمة محلية للأسهم المهمة وربطها بخطة الدخول والأهداف")}${quickJump()}${commandStrip()}<section class="dashgrid"><div class="panel"><h3>قائمة مراقبتي</h3>${rows.length?opportunitiesTable(rows):'<div class="muted">لم تضف أسهم بعد. افتح الفرص واضغط ★ أو تحليل Pro لإضافة سهم.</div>'}</div><div class="leftstack"><div class="panel"><h3>إضافة سريعة</h3><input id="watchInput" placeholder="COMI أو FWRY"><button class="btn primary" id="addWatch" style="margin-top:8px;width:100%">إضافة للقائمة</button></div>${topFive()}</div></section>`
}
function renderAlerts(){
  const a=smartAlerts();
  return `${header("التنبيهات","تنبيهات دخول وأهداف ووقف خسارة من البيانات الحالية")}${quickJump()}${commandStrip()}<section class="dashgrid"><div class="panel"><h3>Smart Alerts</h3>${a.map(x=>`<div class="signal-item ${x.level==="risk"?"risk":""}"><b>${esc(x.symbol)} — ${esc(x.title)}</b><p class="muted">${esc(x.text)}</p></div>`).join("")||'<div class="muted">لا توجد تنبيهات حرجة الآن.</div>'}</div><div class="leftstack"><div class="panel"><h3>تفعيل إشعارات المتصفح</h3><p class="muted">الإشعارات تعمل فقط والمتصفح مفتوح.</p><button class="btn primary" id="notifyBtn">طلب إذن الإشعارات</button></div>${pulsePanel()}</div></section>`
}

}

function kpis(){const p=pulse();return`<section class="kpis">${kpi("عدد الفرص",fmt0(p.rows),"Universe "+fmt0(EGX.source.totalUniverse||p.rows))}${kpi("فرص شراء قوية",fmt0(p.buy),"قريبة من الدخول")}${kpi("فرص مراقبة",fmt0(p.watch),"تحتاج تأكيد")}${kpi("فرص تخفيف مخاطر",fmt0(p.risk),"راجع الوقف",true)}${kpi("متوسط الثقة",fmt0(p.avg)+"%","من البيانات الفعلية")}${kpi("اتساع السوق",p.breadth.toFixed(2),p.status)}</section>`}

function opportunitiesTable(rows){return`<div class="tablewrap"><table><thead><tr><th>#</th><th>الرمز</th><th>اسم السهم</th><th>القطاع</th><th>السعر</th><th>التغير</th><th>الاتجاه</th><th>قيمة التداول</th><th>الحجم</th><th>الدعم</th><th>المقاومة</th><th>منطقة الدخول</th><th>الهدف 1</th><th>الهدف 2</th><th>وقف الخسارة</th><th>R/R</th><th>الثقة</th><th>الجودة</th><th>القرار / الإشارة</th><th>السبب</th><th>إجراء</th></tr></thead><tbody>${rows.slice(0,14).map((r,i)=>{const cls=sclass(r),ch=num(r.changePct)||0,sel=(selectedRow().symbol===r.symbol);return`<tr data-symbol="${esc(r.symbol)}" class="${sel?"selected":""}"><td>${i+1}</td><td class="symbol">${esc(r.symbol)}</td><td class="name">${esc(r.name_ar||r.name||"")}</td><td>${esc(r.sector||"")}</td><td>${fmt(r.price)}</td><td class="${ch>=0?"pos":"neg"}">${pct(ch)}</td><td>${spark(ch>=0?"#22c55e":"#ef4444",ch<0)}</td><td>${fmtCompact(r.valueTraded)}</td><td>${fmtCompact(r.volume)}</td><td>${fmt(r.support1)}</td><td>${fmt(r.resistance1)}</td><td>${fmt(r.entryFrom)} - ${fmt(r.entryTo)}</td><td>${fmt(r.target1)}</td><td>${fmt(r.target2)}</td><td class="neg">${fmt(r.stopLoss)}</td><td>${fmt(rr(r),2)}</td><td><div class="conf"><span class="pct">${fmt0(r.finalConfidence)}%</span><span class="smallbar"><i style="width:${Math.min(100,num(r.finalConfidence)||0)}%"></i></span></div></td><td class="grade">${esc(r.grade)}</td><td><span class="pill ${cls}">${esc(r.recommendation)}</span></td><td title="${esc(r.reason)}">${esc(String(r.reason||"").slice(0,80))}</td><td><button class="watch-star ${inWatch(r.symbol)?"active":""}" data-watch-toggle="${esc(r.symbol)}">★</button> ${proDetailButton(r.symbol)}</td></tr>`}).join("")}</tbody></table></div><div class="pages"><span class="page">‹</span><span class="page active">1</span><span class="page">2</span><span class="page">3</span><span class="page">›</span></div>`}
function detail(row){row=row||selectedRow();return`<div class="detail"><div class="panel"><h3>${esc(row.symbol)} — شارت مرتبط بالصف المحدد <span>Actual/Derived</span></h3><div class="chart">${chartSvg(row)}</div></div><div class="panel"><h3>${esc(row.name_ar||row.symbol)}</h3><div class="metrics"><div class="metric"><span>السعر الحالي</span><b>${fmt(row.price)}</b></div><div class="metric"><span>منطقة الدخول</span><b>${fmt(row.entryFrom)} - ${fmt(row.entryTo)}</b></div><div class="metric"><span>الهدف 1</span><b class="pos">${fmt(row.target1)}</b></div><div class="metric"><span>الهدف 2</span><b class="pos">${fmt(row.target2)}</b></div><div class="metric"><span>وقف الخسارة</span><b class="neg">${fmt(row.stopLoss)}</b></div><div class="metric"><span>قيمة التداول</span><b>${fmtCompact(row.valueTraded)}</b></div><div class="metric"><span>Risk / Reward</span><b>${fmt(rr(row),2)}</b></div><div class="recbox"><h4>${esc(row.recommendation)}</h4><div class="circle" style="--p:${fmt0(row.finalConfidence)}"><b>${fmt0(row.finalConfidence)}%</b></div></div></div><div class="muted" style="margin-top:12px">${esc(row.reason)}. اضغط على أي صف في الجدول لتحديث هذا الجزء.</div></div></div>`}
function opportunities(){const rows=filtered();return`${header("الفرص التفصيلية","ترتيب أفضل فرص الأسهم المصرية حسب الثقة والجودة والقيمة الاستثمارية")}${quickJump()}${commandStrip()}${kpis()}<section class="layout"><div class="leftstack">${topFive()}${pulsePanel()}${notes()}${portfolioQuick()}</div><div class="mainpanel"><div class="focus-band"><div class="focus-card"><h4>أفضل سهم محدد</h4><div><b>${esc((rows[0]||selectedRow()).symbol)}</b> — ${fmt0((rows[0]||selectedRow()).finalConfidence)}%</div></div><div class="focus-card"><h4>تأكيد الدخول</h4><div class="muted">اضغط على الصف لمراجعة الدخول والهدف والوقف قبل أي قرار.</div></div><div class="focus-card"><h4>مخاطر سريعة</h4><div class="muted">${fmt0(rows.filter(r=>sclass(r)==="risk").length)} سهم في قائمة الحذر ضمن الفلتر الحالي.</div></div></div>${toolbar()}${opportunitiesTable(rows)}${detail(rows[0]||selectedRow())}</div></section>`}
function dashboard(){const p=pulse(),top=sorted(),sectors=sectorStats().slice(0,10);return`${header("لوحة السوق","نظرة سريعة ومتكاملة على أداء السوق المصري الآن")}${quickJump()}${commandStrip()}<section class="kpis">${kpi("إجمالي السوق",fmt0(EGX.source.totalUniverse||p.rows),"Universe")}${kpi("داخل الكاش",fmt0(EGX.source.cacheRows||p.rows),"Coverage "+fmt0(EGX.source.universeCoveragePct||100)+"%")}${kpi("عدد الأسهم الصاعدة",fmt0(p.up),"+ حسب آخر قراءة")}${kpi("عدد الأسهم الهابطة",fmt0(p.down),"- حسب آخر قراءة",true)}${kpi("قيمة التداول",fmtCompact(p.value),"من البيانات المقروءة")}${kpi("اتساع السوق",p.breadth.toFixed(2),p.status)}</section><section class="dashgrid"><div class="panel"><h3>اتجاه السوق العام <span>Market Pulse</span></h3><div class="chart" style="height:330px">${chartSvg(top[0])}</div><div class="metrics" style="margin-top:10px"><div class="metric"><span>أفضل سهم</span><b>${esc(top[0]?.symbol||"-")}</b></div><div class="metric"><span>أعلى ثقة</span><b class="pos">${fmt0(top[0]?.finalConfidence)}%</b></div><div class="metric"><span>فرص قوية</span><b>${fmt0(p.buy)}</b></div><div class="metric"><span>مخاطر</span><b class="neg">${fmt0(p.risk)}</b></div></div></div><div class="panel"><h3>خريطة القطاعات من البيانات <span>▦</span></h3><div class="heatmap">${sectors.map(h=>`<div class="heat ${h.avg<0?"red":Math.abs(h.avg)<.05?"neutral":""}"><b>${esc(h.sector)}</b><span class="${h.avg<0?"neg":"pos"}">${pct(h.avg)}</span></div>`).join("")}</div></div></section><section class="dashgrid" style="margin-top:12px"><div class="panel"><h3>أفضل فرص السوق</h3>${opportunitiesTable(top.slice(0,10))}</div><div class="leftstack">${pulsePanel()}${topFive()}</div></section><section class="dashgrid" style="margin-top:12px"><div class="microgrid">${compactList("أفضل الصاعدين",topMovers(),"change")}${compactList("أعلى سيولة",topLiquidity(),"liquidity")}${compactList("مراقبة المخاطر",riskList(),"risk")}</div><div class="panel"><h3>نبض تنفيذي</h3><div class="focus-band"><div class="focus-card"><h4>قوة الفرص</h4><div class="muted">عدد فرص الشراء والقريبة من الدخول: <b class="pos">${fmt0(p.buy)}</b></div></div><div class="focus-card"><h4>جودة التغطية</h4><div class="muted">الكاش الحالي: <b>${fmt0(EGX.source.cacheRows||p.rows)}</b> / ${fmt0(EGX.source.totalUniverse||p.rows)}</div></div><div class="focus-card"><h4>توصية عامة</h4><div class="muted">${p.status==="إيجابي انتقائي"?"انتقاء الأسهم داخل مناطق الدخول فقط.":"الانتظار أفضل حتى تتحسن الثقة."}</div></div></div></div></section>`}
function sectorStats(){const m=new Map();EGX.rows.forEach(r=>{const s=r.sector||"غير مصنف";if(!m.has(s))m.set(s,{sector:s,count:0,sum:0,value:0});const x=m.get(s);x.count++;x.sum+=num(r.changePct)||0;x.value+=num(r.valueTraded)||0});return Array.from(m.values()).map(x=>({...x,avg:x.count?x.sum/x.count:0})).sort((a,b)=>b.value-a.value)}
function parsePortfolio(){return parsePortfolioText(EGX.portfolioText)}
function portfolioRows(){return parsePortfolio().map(p=>{const r=EGX.rows.find(x=>x.symbol===p.symbol)||SAMPLE.find(x=>x.symbol===p.symbol)||{symbol:p.symbol,name_ar:p.symbol,price:p.avg,finalConfidence:0,recommendation:"غير متاح",signal:"WATCH",stopLoss:null,target1:null};const price=num(r.price)||p.avg,val=price*p.qty,cost=p.avg*p.qty,pnl=val-cost;return{...r,...p,price,val,cost,pnl,pnlPct:cost?pnl/cost*100:0,weight:0}})}
function portfolio(){let h=portfolioRows();const total=h.reduce((s,r)=>s+r.val,0),cost=h.reduce((s,r)=>s+r.cost,0),pnl=total-cost;h=h.map(r=>({...r,weight:total?r.val/total*100:0}));return`${header("المحفظة والتقارير الذكية","تحليل المحفظة الفعلي من مدخلاتك وربطها بقرارات شاشة الفرص")}${quickJump()}${commandStrip()}<section class="kpis">${kpi("قيمة المحفظة",fmt0(total),"جنيه مصري")}${kpi("الربح / الخسارة",fmt0(pnl),pct(cost?pnl/cost*100:0),pnl<0)}${kpi("عدد المراكز",fmt0(h.length),"من الإدخال المحلي")}${kpi("متوسط الثقة",fmt0(h.reduce((s,r)=>s+(num(r.finalConfidence)||0),0)/Math.max(1,h.length))+"%","مرتبط بالفرص")}${kpi("المخاطر",h.some(r=>sclass(r)==="risk")?"مرتفعة":"متوسطة","حسب إشارات التخفيض",h.some(r=>sclass(r)==="risk"))}${kpi("السيولة النقدية","—","أضفها لاحقًا")}</section><section class="panel" style="margin-bottom:12px"><h3>استيراد المحفظة <span>Excel / صورة / يدوي</span></h3>
<div class="import-grid">
  <div class="import-card"><h4>1) إدخال يدوي</h4><p>اكتب كل مركز في سطر: SYMBOL,QUANTITY,AVG_COST</p><textarea id="portText">${esc(EGX.portfolioText)}</textarea><button class="btn primary" id="savePort" style="margin-top:8px;width:100%">حفظ وتحليل</button></div>
  <div class="import-card"><h4>2) استيراد Excel / CSV</h4><p>يدعم أعمدة: Symbol, Quantity, Avg Cost أو الرمز، الكمية، متوسط التكلفة.</p><div class="filebox"><input id="excelFile" type="file" accept=".xlsx,.xls,.csv"></div><div id="excelStatus" class="import-status">اختر ملف Excel أو CSV.</div><ul class="help-list"><li>يفضل أول شيت في الملف.</li><li>لو عندك كشف من شركة السمسرة احفظه Excel أو CSV.</li></ul></div>
  <div class="import-card"><h4>3) استيراد من صورة</h4><p>OCR تجريبي. ارفع صورة واضحة لكشف المحفظة ثم راجع النص قبل الاعتماد.</p><div class="filebox"><input id="imageFile" type="file" accept="image/*"></div><img id="ocrPreview" class="preview-img" alt=""><textarea id="ocrText" placeholder="النص المستخرج سيظهر هنا بصيغة SYMBOL,QUANTITY,AVG_COST"></textarea><button class="btn good" id="applyOcr" style="margin-top:8px;width:100%">اعتماد النص المستخرج</button><div id="ocrStatus" class="import-status">اختر صورة واضحة، ويفضل أن يظهر الرمز والكمية ومتوسط التكلفة.</div></div>
</div></section><section class="portgrid"><div class="leftstack"><div class="panel"><h3>توزيع الأصول <span>▣</span></h3><div class="donut"><div class="donut-center">إجمالي<br>${fmt0(total)}</div></div>${h.slice(0,6).map(r=>`<div class="ministat"><span>${esc(r.symbol)}</span><b>${fmt(r.weight)}%</b></div>`).join("")}</div></div><div><div class="panel"><h3>ملخص المراكز</h3><div class="tablewrap"><table style="min-width:980px"><thead><tr><th>الرمز</th><th>الكمية</th><th>متوسط التكلفة</th><th>السعر الحالي</th><th>الربح / الخسارة</th><th>النسبة</th><th>الوزن</th><th>القرار</th><th>الإجراء المقترح</th></tr></thead><tbody>${h.map(r=>`<tr><td class="symbol">${esc(r.symbol)}</td><td>${fmt0(r.qty)}</td><td>${fmt(r.avg)}</td><td>${fmt(r.price)}</td><td class="${r.pnl>=0?"pos":"neg"}">${fmt0(r.pnl)}</td><td class="${r.pnl>=0?"pos":"neg"}">${pct(r.pnlPct)}</td><td>${fmt(r.weight)}%</td><td><span class="pill ${sclass(r)}">${esc(r.recommendation)}</span></td><td>${sclass(r)==="risk"?"تخفيف جزئي":sclass(r)==="buy"?"زيادة مركز":sclass(r)==="near"?"انتظار دخول مناسب":"احتفاظ"}</td></tr>`).join("")}</tbody></table></div></div><div class="dashgrid" style="margin-top:14px"><div class="panel"><h3>تحليل المخاطر</h3>${h.filter(r=>sclass(r)==="risk"||r.price<=r.stopLoss*1.03).slice(0,5).map(r=>`<div class="note"><span class="mark red">!</span><span>${esc(r.symbol)} قريب/داخل منطقة مخاطرة. وقف: ${fmt(r.stopLoss)}</span></div>`).join("")||'<div class="note"><span class="mark">✓</span><span>لا توجد اختراقات وقف واضحة في المراكز المدخلة.</span></div>'}<div class="note"><span class="mark warn">!</span><span>أكبر وزن: ${esc((h.slice().sort((a,b)=>b.weight-a.weight)[0]||{}).symbol||"-")} ${fmt((h.slice().sort((a,b)=>b.weight-a.weight)[0]||{}).weight)}%</span></div></div><div class="panel"><h3>التقارير الذكية</h3><div class="note"><span class="mark">✓</span><span>تقرير بعد 15 دقيقة: ملخص الفرص والتنبيهات.</span></div><div class="note"><span class="mark">✓</span><span>تقرير كل ساعة: تغير الأولويات.</span></div><div class="note"><span class="mark warn">+</span><span>خطة جلسة الغد بعد الإغلاق.</span></div></div></div></div></section><section class="microgrid" style="margin-top:12px">${compactList("مراكز تصلح للزيادة",h.filter(r=>sclass(r)==="buy").slice(0,5),"change")}${compactList("مراكز احتفاظ",h.filter(r=>sclass(r)==="watch"||sclass(r)==="near").slice(0,5),"change")}${compactList("مراكز تخفيف",h.filter(r=>sclass(r)==="risk").slice(0,5),"risk")}</section>`}
function classic(){const rows=sorted().slice(0,12);return`<div class="classic"><div class="box"><h1>EGX Pro Hub — الوضع الكلاسيكي</h1><p>عرض مبسط احتياطي إذا أردت الرجوع من الواجهة الاحترافية مؤقتًا.</p><button class="btn primary" id="proMode">العودة للوضع الاحترافي</button></div><div class="box"><h2>الفرص</h2>${opportunitiesTable(rows)}</div></div>`}
function placeholder(title){return`${header(title,"تم توحيد التصميم ضمن الواجهة الاحترافية الجديدة.")}${kpis()}<section class="layout"><div class="leftstack">${pulsePanel()}${notes()}</div><div class="mainpanel">${opportunitiesTable(sorted().slice(0,10))}${detail(selectedRow())}</div></section>`}
function content(){if(EGX.screen==="classic")return classic();if(EGX.screen==="dashboard")return dashboard();if(EGX.screen==="portfolio")return portfolio();if(EGX.screen==="opportunities")return opportunities();if(EGX.screen==="watchlist")return renderWatchlist();if(EGX.screen==="alerts")return renderAlerts();if(EGX.screen==="reports")return renderReports();if(EGX.screen==="settings")return renderSettings();const names={liquidity:"مراقب السيولة",volume:"مراقب حجم التداول",support:"الدعم والمقاومة",sources:"صحة المصادر"};return placeholder(names[EGX.screen]||"EGX Pro Hub")}
function render(){document.getElementById("app").innerHTML=EGX.screen==="classic"?content():`<div class="shell">${side()}<main class="main">${content()}</main></div>`;bind()}
function bind(){document.querySelectorAll("[data-screen]").forEach(b=>b.onclick=()=>{EGX.screen=b.dataset.screen;localStorage.setItem("egx_v61_screen",EGX.screen);render()});document.querySelectorAll("[data-symbol]").forEach(tr=>tr.onclick=()=>{EGX.selected=tr.dataset.symbol;render()});document.querySelectorAll("[data-pro-detail]").forEach(b=>b.onclick=e=>{e.stopPropagation();openProDrawer(b.dataset.proDetail)});
document.querySelectorAll("[data-watch-toggle]").forEach(b=>b.onclick=e=>{e.stopPropagation();toggleWatch(b.dataset.watchToggle)});
const aw=document.getElementById("addWatch");const wi=document.getElementById("watchInput");if(aw&&wi)aw.onclick=()=>{toggleWatch(wi.value)};
const nb=document.getElementById("notifyBtn");if(nb)nb.onclick=async()=>{try{if(!("Notification" in window)){alert("المتصفح لا يدعم الإشعارات");return}const p=await Notification.requestPermission();if(p==="granted"){new Notification("EGX Pro Hub",{body:"تم تفعيل إشعارات المتصفح أثناء فتح الصفحة."})}}catch(e){}};
const cr=document.getElementById("copyReport");if(cr)cr.onclick=async()=>{const t=document.getElementById("reportText")?.innerText||"";try{await navigator.clipboard.writeText(t);cr.textContent="تم النسخ"}catch(e){alert(t)}};
const cl=document.getElementById("clearLocal");if(cl)cl.onclick=()=>{if(confirm("مسح المحفظة وقوائم المراقبة المحلية؟")){localStorage.removeItem("egx_v61_portfolio");localStorage.removeItem("egx_v64_watchlist");EGX.watchlist=[];EGX.portfolioText="";render()}};const s=document.getElementById("search");if(s){s.oninput=e=>{EGX.query=e.target.value;render()};setTimeout(()=>{try{s.focus({preventScroll:true});s.setSelectionRange(s.value.length,s.value.length)}catch(e){}},0)}const f=document.getElementById("filter");if(f){f.value=EGX.filter;f.onchange=e=>{EGX.filter=e.target.value;render()}}const c=document.getElementById("conf");if(c){c.value=EGX.confidence;c.onchange=e=>{EGX.confidence=e.target.value;render()}}const sec=document.getElementById("sector");if(sec){sec.value=EGX.sector;sec.onchange=e=>{EGX.sector=e.target.value;render()}}const r=document.getElementById("reset");if(r)r.onclick=()=>{EGX.query="";EGX.filter="all";EGX.confidence="all";EGX.sector="all";render()};const ref=document.getElementById("refresh");if(ref)ref.onclick=()=>location.reload();const exp=document.getElementById("export");if(exp)exp.onclick=exportCsv;const cb=document.getElementById("classicBtn");if(cb)cb.onclick=()=>{EGX.screen="classic";render()};const ct=document.getElementById("classicTop");if(ct)ct.onclick=()=>{EGX.screen="classic";render()};const pm=document.getElementById("proMode");if(pm)pm.onclick=()=>{EGX.screen="opportunities";localStorage.setItem("egx_v61_screen","opportunities");history.replaceState(null,"",location.pathname);render()};const pt=document.getElementById("portText");const sp=document.getElementById("savePort");if(sp&&pt)sp.onclick=()=>{EGX.portfolioText=pt.value;localStorage.setItem("egx_v61_portfolio",EGX.portfolioText);render()};const xf=document.getElementById("excelFile");if(xf)xf.onchange=e=>handleExcelImport(e.target.files&&e.target.files[0]);const im=document.getElementById("imageFile");if(im)im.onchange=e=>handleImageImport(e.target.files&&e.target.files[0]);const ap=document.getElementById("applyOcr");const ot=document.getElementById("ocrText");if(ap&&ot)ap.onclick=()=>{const rows=parsePortfolioText(ot.value);if(!rows.length){setImportStatus("ocrStatus","النص غير صالح. اكتب مثل: COMI,5000,77.50","bad");return}EGX.portfolioText=mergePortfolioText(rowsToPortfolioText(rows));localStorage.setItem("egx_v61_portfolio",EGX.portfolioText);setImportStatus("ocrStatus",`تم اعتماد ${rows.length} مركز وإضافتها للمحفظة.`,"good");render()}}
async function init(){const[recs,cache,market,source,alerts,history,pro,news]=await Promise.all([loadJson("data/recommendations.json",{}),loadJson("data/full-market-cache.json",{}),loadJson("data/market.json",{}),loadJson("data/source-health.json",{}),loadJson("data/alerts.json",{}),loadJson("data/history.json",{}),loadJson("data/pro-report.json",{}),loadJson("data/news-report.json",{})]);EGX.source=source||{};EGX.market=market||{};EGX.alerts=alerts||{};EGX.history=history||{};EGX.pro=pro||{};EGX.news=news||{};let raw=[];if(recs&&Array.isArray(recs.all)&&recs.all.length)raw=recs.all;else if(cache&&Array.isArray(cache.rows)&&cache.rows.length)raw=cache.rows;else if(market&&Array.isArray(market.rows)&&market.rows.length)raw=market.rows;else raw=SAMPLE;EGX.rows=raw.map(normalizeRow).filter(Boolean);if(!EGX.rows.length)EGX.rows=SAMPLE.map(normalizeRow);EGX.selected=(sorted()[0]||{}).symbol;render();console.log("EGX Pro Hub V6.1 Real Data Pro Upgrade loaded:",EGX.rows.length)}
init();
})();
