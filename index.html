function exportCsv(){const rows=filtered(),heads=["priority","symbol","name_ar","price","changePct","valueTraded","volume","support1","resistance1","entryFrom","entryTo","target1","target2","stopLoss","finalConfidence","dataQualityScore","recommendation","reason"];const csv=[heads.join(",")].concat(rows.map(r=>heads.map(h=>`"${String(r[h]??"").replace(/"/g,'""')}"`).join(","))).join("\n");download("egx-pro-hub-opportunities.csv",csv,"text/csv;charset=utf-8")}

function kpi(label,value,delta,red){return`<div class="card kpi"><div class="label">${label}</div><div class="value">${value}</div><div class="delta ${red?"red":""}">${delta||""}</div><div class="spark"><svg viewBox="0 0 120 24"><polyline points="2,18 14,10 26,15 38,7 50,14 62,8 74,12 86,5 100,9 118,4" fill="none" stroke="${red?"#ef4444":"#22c55e"}" stroke-width="2"/></svg></div></div>`}
function side(){const nav=[["dashboard","لوحة السوق","⌂"],["opportunities","الفرص التفصيلية","◎"],["liquidity","مراقب السيولة","◒"],["volume","مراقب حجم التداول","▥"],["support","الدعم والمقاومة","◇"],["portfolio","المحفظة والتقارير الذكية","◈"],["sources","صحة المصادر","✦"],["alerts","التنبيهات","♢"],["settings","الإعدادات","⚙"]];return`<aside class="side"><div class="brand"><div class="logo">EGX</div><div><h1>EGX Pro Hub</h1><p>Professional Terminal</p></div></div><div class="nav-title">لوحة التحكم</div><nav class="nav">${nav.map(n=>`<button data-screen="${n[0]}" class="${EGX.screen===n[0]?"active":""}"><span>${n[1]}</span><span class="ico">${n[2]}</span></button>`).join("")}</nav><div class="footer"><div class="live">متصل</div><div class="muted" style="margin-top:8px">بيانات عامة ومتأخرة — مساعد قرار فقط.</div></div></aside>`}
function header(title,sub){const last=EGX.source.generatedAt||EGX.source.lastSuccessAt||EGX.market.updatedAt||new Date().toISOString();return`<div class="head"><div><h2>${title}</h2><p>${sub}</p></div><div class="actions"><button class="btn primary" id="refresh">⚡ تحديث البيانات</button><button class="btn" id="export">تصدير CSV</button><button class="btn" onclick="window.print()">طباعة</button></div></div><div class="chips"><span class="chip"><i class="dot"></i> نطاق التغطية: السوق المصري</span><span class="chip warn"><i class="dot"></i> وضع المصدر: Public Delayed</span><span class="chip info"><i class="dot"></i> آخر تحديث: ${esc(new Date(last).toLocaleString("en-GB"))}</span><span class="chip info"><i class="dot"></i> ذاكرة التخزين: ${fmt0(EGX.source.cacheRows||EGX.rows.length)} / ${fmt0(EGX.source.totalUniverse||EGX.rows.length)}</span><span class="chip"><i class="dot"></i> جودة البيانات: ${fmt0(EGX.source.avgDataQuality||100)}%</span></div>`}
function kpis(){const p=pulse();return`<section class="kpis">${kpi("عدد الفرص",fmt0(p.rows),"↑ "+fmt0(Math.max(0,p.buy))+" عن أمس")}${kpi("فرص شراء قوية",fmt0(p.buy),"↑ 3 عن أمس")}${kpi("فرص مراقبة",fmt0(p.watch),"— دون تغيير")}${kpi("فرص تخفيف مخاطر",fmt0(p.risk),"↓ 2 عن أمس",true)}${kpi("متوسط الثقة",fmt0(p.avg)+"%","↑ 4% عن أمس")}${kpi("اتساع السوق",p.breadth.toFixed(2),p.status)}</section>`}
function topFive(){const top=sorted().slice(0,5);return`<div class="panel"><h3>أفضل 5 فرص اليوم <span>🏆</span></h3><div class="list">${top.map((r,i)=>`<div class="listrow"><span class="rank">${i+1}</span><b>${esc(r.symbol)}</b><span>${fmt0(r.finalConfidence)}%</span><div></div><div class="bar"><span style="width:${Math.min(100,r.finalConfidence)}%"></span></div></div>`).join("")}</div></div>`}
function pulsePanel(){const p=pulse();return`<div class="panel"><h3>نبض السوق <span>〽</span></h3><div class="ministat"><span>الاتجاه العام</span><b class="${p.breadth>=.5?"pos":"neg"}">${p.status}</b></div><div class="ministat"><span>اتساع السوق</span><b>${p.breadth.toFixed(2)}</b></div><div class="ministat"><span>قوة الشراء</span><b class="pos">${fmt0(p.breadth*100)}%</b></div><div class="ministat"><span>قوة البيع</span><b class="neg">${fmt0((1-p.breadth)*100)}%</b></div><div class="muted" style="margin-top:8px">أداء القطاعات</div><div class="segment"><i style="width:38%"></i><i style="width:25%"></i><i style="width:20%"></i><i style="width:17%"></i></div></div>`}

function toolbar(){return`<div class="panel toolbar"><input id="search" dir="auto" value="${esc(EGX.query)}" placeholder="البحث بالرمز أو اسم السهم، مثال: COMI أو التجاري"><select id="filter"><option value="all">كل الإشارات</option><option value="buy">شراء انتقائي</option><option value="near">قريب من الدخول</option><option value="watch">مراقبة</option><option value="risk">تخفيف مخاطر</option></select><select id="conf"><option value="all">كل مستويات الثقة</option><option value="80">ثقة 80%+</option><option value="70">ثقة 70%+</option><option value="60">ثقة 60%+</option></select><select><option>ترتيب: أفضل فرصة</option><option>الأعلى ثقة</option><option>الأعلى سيولة</option></select><button class="btn" id="reset">إعادة تعيين</button></div>`}
function table(rows){return`<div class="tablewrap"><table><thead><tr><th>#</th><th>الرمز</th><th>اسم السهم</th><th>السعر</th><th>التغير</th><th>الاتجاه</th><th>قيمة التداول</th><th>الحجم</th><th>الدعم</th><th>المقاومة</th><th>منطقة الدخول</th><th>الهدف 1</th><th>الهدف 2</th><th>وقف الخسارة</th><th>الثقة</th><th>الجودة</th><th>القرار / الإشارة</th><th>السبب</th></tr></thead><tbody>${rows.slice(0,12).map((r,i)=>{const cls=sclass(r),ch=num(r.changePct)||0;return`<tr><td>${i+1}</td><td class="symbol">${esc(r.symbol)}</td><td class="name">${esc(r.name_ar||r.name||"")}</td><td>${fmt(r.price)}</td><td class="${ch>=0?"pos":"neg"}">${pct(ch)}</td><td>${spark(ch>=0?"#22c55e":"#ef4444",ch<0)}</td><td>${esc(r.valueTraded)}</td><td>${esc(r.volume)}</td><td>${fmt(r.support1)}</td><td>${fmt(r.resistance1)}</td><td>${fmt(r.entryFrom)} - ${fmt(r.entryTo)}</td><td>${fmt(r.target1)}</td><td>${fmt(r.target2)}</td><td class="neg">${fmt(r.stopLoss)}</td><td><div class="conf"><span class="pct">${fmt0(r.finalConfidence)}%</span><span class="smallbar"><i style="width:${Math.min(100,num(r.finalConfidence)||0)}%"></i></span></div></td><td class="grade">${esc(r.grade)}</td><td><span class="pill ${cls}">${esc(r.recommendation)}</span></td><td title="${esc(r.reason)}">${esc(String(r.reason||"").slice(0,80))}</td></tr>`}).join("")}</tbody></table></div><div class="pages"><span class="page">‹</span><span class="page active">1</span><span class="page">2</span><span class="page">3</span><span class="page">›</span></div>`}
function detail(row){row=row||sorted()[0]||SAMPLE[0];return`<div class="detail"><div class="panel"><h3>${esc(row.symbol)} — الرسم البياني <span>1M</span></h3><div class="chart">${candle()}</div></div><div class="panel"><h3>${esc(row.name_ar||row.symbol)}</h3><div class="metrics"><div class="metric"><span>السعر الحالي</span><b>${fmt(row.price)}</b></div><div class="metric"><span>منطقة الدخول</span><b>${fmt(row.entryFrom)} - ${fmt(row.entryTo)}</b></div><div class="metric"><span>الهدف 1</span><b class="pos">${fmt(row.target1)}</b></div><div class="metric"><span>وقف الخسارة</span><b class="neg">${fmt(row.stopLoss)}</b></div><div class="metric"><span>قيمة التداول</span><b>${esc(row.valueTraded)}</b></div><div class="metric"><span>الحجم</span><b>${esc(row.volume)}</b></div><div class="metric"><span>Risk / Reward</span><b>${fmt(row.riskReward)}</b></div><div class="recbox"><h4>${esc(row.recommendation)}</h4><div class="circle" style="--p:${fmt0(row.finalConfidence)}"><b>${fmt0(row.finalConfidence)}%</b></div></div></div><div class="muted" style="margin-top:12px">${esc(row.reason)}. البيانات عامة ومتأخرة وليست أوامر تداول.</div></div></div>`}

function portfolio(){const h=holdings(),total=h.reduce((s,r)=>s+r.qty*r.price,0),cost=h.reduce((s,r)=>s+r.qty*r.avg,0),pnl=total-cost;return`${header("المحفظة والتقارير الذكية","تحليل المحفظة، توزيع الأصول، إدارة المخاطر، التوصيات الذكية وتقارير الجلسة")}<section class="kpis">${kpi("قيمة المحفظة",fmt0(total),"جنيه مصري")}${kpi("العائد اليومي","+1.27%","+"+fmt0(Math.abs(pnl/5))+" ج.م")}${kpi("العائد الشهري","+6.42%","+4.21% منذ بداية الشهر")}${kpi("متوسط الثقة",fmt0(pulse().avg)+"%","مرتفع")}${kpi("المخاطر","متوسطة","مستوى مقبول")}${kpi("عدد التنبيهات",fmt0((EGX.alerts.alerts||[]).length||7),"3 جديدة")}</section><section class="portgrid"><div class="leftstack"><div class="panel"><h3>توزيع الأصول <span>▣</span></h3><div class="donut"><div class="donut-center">إجمالي<br>${fmt0(total)}</div></div>${["البنوك 28%","العقارات 19%","البترول 16%","الأسمنت 12%","الاتصالات 9%","نقدي 8%"].map(x=>`<div class="ministat"><span>${x.split(" ")[0]}</span><b>${x.split(" ").slice(1).join(" ")}</b></div>`).join("")}</div><div class="panel"><h3>التوصيات الذكية <span>★</span></h3>${h.slice(0,4).map((r,i)=>`<div class="note"><span class="mark ${i===1?"warn":""}">${i===1?"!":"✓"}</span><span><b>${esc(r.symbol)}</b> — ${i===0?"زيادة مركز":i===1?"تخفيف جزئي":i===2?"جني جزء من الأرباح":"احتفاظ"}</span></div>`).join("")}</div></div><div><div class="panel"><h3>ملخص المراكز</h3><div class="tablewrap"><table style="min-width:980px"><thead><tr><th>الرمز</th><th>الكمية</th><th>متوسط التكلفة</th><th>السعر الحالي</th><th>الربح / الخسارة</th><th>الوزن</th><th>القرار</th><th>الإجراء المقترح</th></tr></thead><tbody>${h.map(r=>{const val=r.qty*r.price,c=r.qty*r.avg,p=val-c;return`<tr><td class="symbol">${esc(r.symbol)}</td><td>${fmt0(r.qty)}</td><td>${fmt(r.avg)}</td><td>${fmt(r.price)}</td><td class="${p>=0?"pos":"neg"}">${fmt0(p)}</td><td>${fmt((val/total)*100)}%</td><td><span class="pill ${sclass(r)}">${esc(r.recommendation)}</span></td><td>${sclass(r)==="risk"?"تخفيف جزئي":sclass(r)==="buy"?"زيادة مركز":"احتفاظ"}</td></tr>`}).join("")}</tbody></table></div></div><div class="dashgrid" style="margin-top:14px"><div class="panel"><h3>تحليل المخاطر</h3><div class="note"><span class="mark warn">!</span><span>مراجعة الأسهم القريبة من وقف الخسارة.</span></div><div class="note"><span class="mark warn">!</span><span>البنوك تمثل 28% من المحفظة.</span></div><div class="note"><span class="mark">✓</span><span>أقصى تراجع ضمن الحدود المقبولة.</span></div></div><div class="panel"><h3>التنبيهات</h3><div class="note"><span class="mark">✓</span><span>COMI تجاوز المتوسط المتحرك 20 يوم.</span></div><div class="note"><span class="mark warn">!</span><span>EFGH قريب من وقف الخسارة.</span></div><div class="note"><span class="mark warn">+</span><span>ABUK حجم تداول مرتفع.</span></div></div></div></div></section>`}
function placeholder(title){return`${header(title,"تم توحيد التصميم ضمن الواجهة الاحترافية الجديدة.")}${kpis()}<section class="layout"><div class="leftstack">${pulsePanel()}${notes()}</div><div class="mainpanel">${table(sorted().slice(0,10))}${detail(sorted()[0])}</div></section>`}
function content(){if(EGX.screen==="dashboard")return dashboard();if(EGX.screen==="portfolio")return portfolio();if(EGX.screen==="opportunities")return opportunities();const names={liquidity:"مراقب السيولة",volume:"مراقب حجم التداول",support:"الدعم والمقاومة",sources:"صحة المصادر",alerts:"التنبيهات",settings:"الإعدادات"};return placeholder(names[EGX.screen]||"EGX Pro Hub")}
function render(){document.getElementById("app").innerHTML=`<div class="shell">${side()}<main class="main">${content()}</main></div>`;bind()}
function bind(){document.querySelectorAll("[data-screen]").forEach(b=>b.onclick=()=>{EGX.screen=b.dataset.screen;localStorage.setItem("egx_one_screen",EGX.screen);render()});const s=document.getElementById("search");if(s){s.oninput=e=>{EGX.query=e.target.value;render()};setTimeout(()=>{try{s.focus({preventScroll:true});s.setSelectionRange(s.value.length,s.value.length)}catch(e){}},0)}const f=document.getElementById("filter");if(f){f.value=EGX.filter;f.onchange=e=>{EGX.filter=e.target.value;render()}}const c=document.getElementById("conf");if(c){c.value=EGX.confidence;c.onchange=e=>{EGX.confidence=e.target.value;render()}}const r=document.getElementById("reset");if(r)r.onclick=()=>{EGX.query="";EGX.filter="all";EGX.confidence="all";render()};const ref=document.getElementById("refresh");if(ref)ref.onclick=()=>location.reload();const exp=document.getElementById("export");if(exp)exp.onclick=exportCsv}
async function init(){const[recs,cache,market,source,alerts]=await Promise.all([loadJson("data/recommendations.json",{}),loadJson("data/full-market-cache.json",{}),loadJson("data/market.json",{}),loadJson("data/source-health.json",{}),loadJson("data/alerts.json",{})]);EGX.source=source||{};EGX.market=market||{};EGX.alerts=alerts||{};let raw=[];if(recs&&Array.isArray(recs.all)&&recs.all.length)raw=recs.all;else if(cache&&Array.isArray(cache.rows)&&cache.rows.length)raw=cache.rows;else if(market&&Array.isArray(market.rows)&&market.rows.length)raw=market.rows;else raw=SAMPLE;EGX.rows=raw.map(normalizeRow).filter(Boolean);if(!EGX.rows.length)EGX.rows=SAMPLE.map(normalizeRow);render();console.log("EGX Pro Hub One File Redesign loaded:",EGX.rows.length)}
init();
})();
</script>
