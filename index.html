  <title>EGX Pro Hub Web — Real Confidence Fusion</title>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">EGX</div>
        <div>
          <h1>EGX Pro Hub</h1>
          <p>Web Confidence Fusion</p>
        </div>
      </div>

      <nav>
        <button class="nav active" data-view="dashboard">🏠 لوحة السوق</button>
        <button class="nav" data-view="opportunities">🎯 الفرص التفصيلية</button>
        <button class="nav" data-view="liquidity">💧 مراقب السيولة</button>
        <button class="nav" data-view="volume">📊 مراقب حجم التداول</button>
        <button class="nav" data-view="support">📌 الدعم والمقاومة</button>
        <button class="nav" data-view="decision">🧠 القرار الاستثماري</button>
        <button class="nav" data-view="validation">✅ مطابقة مباشر</button>
        <button class="nav" data-view="sources">🛰️ صحة المصادر</button>
        <button class="nav" data-view="alerts">🚨 التنبيهات</button>
        <button class="nav" data-view="watchlists">⭐ قوائم المراقبة</button>
        <button class="nav" data-view="dailyReport">🗓️ التقرير اليومي</button>
        <button class="nav" data-view="settings">⚙️ الإعدادات</button>
      </nav>

      <div class="disclaimer">
        بيانات عامة ومتأخرة. الأداة مساعد قرار فقط وليست مستشارًا ماليًا ولا تنفّذ أوامر تداول.
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="viewTitle">لوحة السوق</h2>
          <p id="viewSubtitle">نسخة Web مستوحاة من EGX Pro Hub مع GitHub Actions وReal Confidence Fusion.</p>
        </div>
        <div class="top-actions">
          <a class="primary link-btn" target="_blank" href="https://github.com/rasheadsca-star/RAS-EGX0.1/actions/workflows/update-market-data.yml">⚡ تحديث البيانات</a>
          <button id="reloadData" class="secondary">🔄 إعادة تحميل</button>
          <button id="exportCsv" class="secondary">CSV</button>
          <button id="printPage" class="secondary">🖨️ طباعة</button>
          <span id="sourceBadge" class="status-pill">جار التحميل...</span>
        </div>
      </header>

      <section id="notice" class="notice">جار تحميل ملفات البيانات...</section>

      <section id="dashboard" class="view active"></section>
      <section id="opportunities" class="view"></section>
      <section id="liquidity" class="view"></section>
      <section id="volume" class="view"></section>
      <section id="support" class="view"></section>
      <section id="decision" class="view"></section>
      <section id="validation" class="view"></section>
      <section id="sources" class="view"></section>
      <section id="alerts" class="view"></section>
      <section id="watchlists" class="view"></section>
      <section id="dailyReport" class="view"></section>
      <section id="settings" class="view"></section>
    </main>
  </div>
